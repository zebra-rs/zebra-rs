# CHANGELOG.yaml – the single source of truth for the project changelog.
# nfpm (packaging/nfpm-*.yaml) reads this file to build the Debian changelog.
# Keep newest entry first.
# All timestamps must be in full ISO-8601 format.
# Fields "distribution" and "urgency" are optional per-entry; if you omit
# them, the defaults from .chglog.yml (or chglog config) are used.

- semver: 26.7.4
  date: 2026-07-12T18:00:00+09:00
  distribution: unstable
  urgency: medium
  packager: Kunihiro Ishiguro <kunihiro@zebra.rs>
  changes:
    - note: |
        ### eBPF data plane (cradle)
        * A managed eBPF/XDP forwarding engine is supervised under a
          single `system ebpf enabled` knob; enabling it spawns the
          engine and tees the mirrored FIB into it
        * `system ebpf` and `interface ebpf` YANG knobs; engine ports
          reconcile from `interface <name> ebpf enabled` and bind to
          the interface's VRF table
        * The mirrored FIB tee replays into a restarted engine, and
          resyncs already-installed routes when the tee is enabled
          after convergence, so a late start converges to the RIB
        * Bridge-enslaved interfaces are brought up as eBPF L2 ports
        * `show ebpf {status,l2,ipv4,ipv6,mpls,srv6,nexthop,stats}`
          with per-VRF `show ebpf {ipv4,ipv6} vrf <name>`; ANSI escapes
          are stripped from relayed engine log lines
        * `mpls ttl propagate {pipe|uniform}` selects the RFC 3443 MPLS
          label-TTL model teed to cradle (pipe hides the LSP, the
          default; uniform exposes the hop count end to end) via
          `Nexthop.mpls_pipe_ttl` at imposition and `Ilm.ttl_uniform`
          at pop-to-IP disposition; a per-VRF `vrf <name> mpls ttl
          propagate {inherit|pipe|uniform}` override applies to that
          VRF's L3VPN LSPs at both ends (e.g. uniform in the global
          table, pipe per VPN)

    - note: |
        ### EVPN
        * BGP-EVPN over VXLAN is teed into the cradle eBPF data plane
        * EVPN Type-5 symmetric-IRB routes are teed to the cradle, with
          import/origination made to converge
        * The cradle VNI binding is withdrawn when its VXLAN device is
          removed

    - note: |
        ### IS-IS
        * Interoperate with Cisco IOS legacy 1-octet P2P three-way TLV
        * Join the IS-IS L2 multicast groups on the packet socket, so
          adjacencies survive on real NICs (not just under promisc)
        * Emit the AFI-prefixed area address in the self-LSP
        * The SR data plane (SR-MPLS vs SRv6) is now a YANG choice,
          with choice exclusivity enforced at commit

    - note: |
        ### OSPF
        * OSPFv3 segment-routing mpls/srv6 is a YANG choice; the SID
          owner protocol is stamped on uninstall

    - note: |
        ### BGP
        * MUP: fix suppressed withdraws and withdraw the advertised ST1
          NLRI; clear the MUP Adj-RIB-Out on peer-down; show every
          ISD/DSD service SID and pick the SID by UE family; drop
          identical re-exports so handover stops re-sending the ST2
        * Recursive SRv6 segment inheritance in the nexthop resolver:
          a route inherits SRv6 segments from its next-hop's covering
          route
        * Fast redial via idle-hold after a refused dial
        * `show bgp neighbor` now prints the IPv6 MPLS VPN capability
        * The unused GTP data plane enum is disabled

    - note: |
        ### RIB / VTY
        * `show ip route` takes a positional address/prefix; the
          `prefix` keyword is dropped, including `show ip route vrf
          <name> <addr|prefix>`
        * Honest static-ILM rows in `show mpls ilm`
        * FIB unicast routes install with NLM_F_REPLACE for in-place
          re-resolution; recursive static route prefix corrected

    - note: |
        ### Playset labs / docs
        * SRv6 and SR-MPLS static-route walkthroughs added to the
          isis-srv6-usid, srv6-classic, ospfv3-srv6, and ospfv2-srmpls
          lab READMEs
        * New single-knob eBPF data-plane book chapter; refreshed
          static-route chapters to the current config model

    - note: |
        ### Infrastructure
        * Per-namespace ZEBRA_OSPF_CHECKPOINT_DIR for each BDD daemon,
          so a shared OSPF graceful-restart checkpoint no longer
          poisons non-GR OSPF daemons at higher concurrency

- semver: 26.7.3
  date: 2026-07-11T18:00:00+09:00
  distribution: unstable
  urgency: medium
  packager: Kunihiro Ishiguro <kunihiro@zebra.rs>
  changes:
    - note: |
        ### Playset labs
        * New lab collection under playset/: the TI-LFA fast-reroute
          matrix (IS-IS / OSPFv2 / OSPFv3 x SR-MPLS / SRv6 classic /
          SRv6 uSID), BGP EVPN VXLAN over IPv4 and IPv6 underlays
          with multi-tenant variants, and Inter-AS L3VPN Options A,
          B, C, C with route reflector, and AB - each a namespace
          topology with walkthrough README and reference diagram
        * Labs ship in the Debian package at
          /usr/share/zebra-rs/playset and run from a read-only
          install location: runtime state (logs, pid files) moved
          to /tmp/zebra-rs-playset/<lab>

    - note: |
        ### EVPN
        * Wire the single-VXLAN-device kernel datapath for EVPN
          bridging

    - note: |
        ### TI-LFA / SR-MPLS
        * IS-IS and OSPF TI-LFA repair stacks terminate at the
          destination's node SID
        * Recursive static routes over SR-MPLS: NHT resolves through
          a protected nexthop's active member only, static routes
          re-push when their recursive resolution moves, recursive
          nexthops rendered FRR-style in `show ip route`
        * FIB unicast routes install with NLM_F_REPLACE, so
          re-resolution updates the kernel route in place

    - note: |
        ### BGP / RIB
        * RFC 9774 `as-sets-withdraw` global toggle
        * SRv6 SID routes are attributed to their owning protocol

    - note: |
        ### VTY / CLI
        * Configured `system hostname` is rendered in the vty prompt

    - note: |
        ### Packaging
        * Debian prerm stops the zebra-rs service on package
          removal; previously an orphaned daemon kept running with
          a deleted binary

- semver: 26.7.2
  date: 2026-07-10T18:00:00+09:00
  distribution: unstable
  urgency: medium
  packager: Kunihiro Ishiguro <kunihiro@zebra.rs>
  changes:
    - note: |
        ### BGP configuration / YANG
        * Neighbor schema audit: remove 43 handler-less (orphan) nodes
          from the neighbor subtree, restore the standard `enabled`
          leaf, fill/trim CLI help across the tree; global
          graceful-restart / route-flap-damping / peer-group orphans
          removed
        * `neighbor X description LINE` restored with a real config
          handler (global and per-VRF CE peers), echoed in
          `show bgp neighbors`; description values take the rest of
          the command line
        * `redistribute` presence containers (global per-AFI and
          per-VRF per-family) are `ext:non-empty`: a bare container is
          rejected at commit and pruned when its last source is deleted
        * FRR-compatible AS-path regex matching; route-map `set`
          for extended / large communities
        * `shards` / `peer-task` knobs moved under a `sharding`
          container; global `hostname` / `no-fib-install` /
          `fast-external-failover` hoisted to direct `router bgp`
          children

    - note: |
        ### IS-IS
        * LAN DIS stability: converge re-election on priority change,
          regenerate the DIS pseudonode LSP on LAN membership change
        * `show isis topology` output matches the FRR layout
        * Connected-prefix reachability advertised with the interface
          metric

    - note: |
        ### cradle dataplane / RIB
        * `system cradle enabled` knob gates the tee (endpoint moved
          under it); tee dialed over Linux abstract Unix sockets;
          FDB guard fix; "enabled" logged once; book chapter for the
          eBPF data-plane integration
        * Static route nexthops resolve recursively through the
          underlay
        * IS-IS SR-MPLS lab harness (playset)

    - note: |
        ### VTY / CLI
        * `?` / possible-completions help paged through the pager;
          drop `--raw-control-chars` so wrapped route lines keep the
          top of the output
        * CLI help filled in for every set/show command node
        * Root enters configure mode silently; VRF-task and vty-auth
          startup logs gated behind tracing

    - note: |
        ### Build / packaging / infrastructure
        * Lua scripting engine disabled by default for now (BGP Lua
          schema commented out)
        * nanomsg dependency removed
        * Packaging metadata fixes (homepage, license); drop the
          redundant `--features lua` from the release build; clippy
          1.97 lint sweep
        * BDD: clean-env step sweeps a stale shared startup config
          (/etc/zebra-rs/zebra-rs.conf)

- semver: 26.7.1
  date: 2026-07-06T18:00:00+09:00
  distribution: unstable
  urgency: medium
  packager: Kunihiro Ishiguro <kunihiro@zebra.rs>
  changes:
    - note: |
        ### BGP Mobile User Plane (MUP, SAFI 85)
        * ISD / DSD / Type-1 / Type-2 session-transformed routes:
          origination (dual-ST, ISD), per-VRF RT-based import, VRF-first
          model with RD applied at the export boundary, per-VRF label block
        * MUP-C: PFCP N4 session handling (gNB F-TEID, Created-PDR,
          UPF address, SEID echo) and session show commands
        * GTP-U dataplane via cradle: downlink encapsulation, forwarding
          install, local-endpoint re-dispatch, dataplane selector
        * In-place ST export replace on PFCP Session Modification (handover)

    - note: |
        ### BGP EVPN
        * VPWS (RFC 8214): E-Line service instances, Layer-2 Attributes
          extended community, VLAN handling, DX2/DX2V forwarding, show
        * Ethernet Segment multihoming foundations: ES config and codec,
          Type-4 ES routes, Type-1 ES-AD routes, DF election; MAC Mobility
        * BUM tunnel segmentation completion: per-VTEP SMET destinations,
          RBR fixes; PMSI show; IGMP sync codec and debug commands

    - note: |
        ### OSPF / OSPFv3 (FRR parity arc)
        * Virtual links (RFC 2328 §15) with multi-hop backlinks and
          per-VL authentication; stub router for v2 and v3
        * SPF and LSA-generation throttling, min LS arrival, area-range
          with discard routes, passive-interface, default-originate
        * Redistribute: BGP (v2 and v3), kernel table, route-map filtering
        * OSPFv3: graceful restart (helper and restarter), instance-id,
          ABR inter-area summaries, authentication (RFC 7166) wire fixes
        * Inter-area ASBR Type-4 fallback; Flex-Algo nexthop resolution

    - note: |
        ### IS-IS
        * Mirror-SID egress protection over SR-MPLS: codec, origination,
          ILM programming, link/node failover, hold-down, withdrawal
        * BGP-PIC integration: NHT retention, node failover via Mirror SID
        * L3VPN PE-CE with IS-IS as the CE routing protocol

    - note: |
        ### SRv6 / dataplane (cradle tees)
        * SRv6 behaviors: static End.DX4/DX6, VRF-bound End.T/uT,
          endpoint flavors PSP/USP/USD, End.B6.Encaps Binding SID,
          REPLACE-C-SID locators (RFC 9800)
        * cradle dataplane tees: VRF, MPLS, SRv6, EVPN-over-SRv6,
          replication slots, FDB watch/aging, End.M mirror context,
          TI-LFA repair pairs and SR-MPLS backup, connected routes
        * RIB: `nexthop blackhole` discard routes; static routes in VRF;
          close a redistribute-registration cross-channel race

    - note: |
        ### BGP (other)
        * Lua policy scripting: import/withdraw and egress hooks (IPv4,
          EVPN), side-effect channel, example scripts, on by default
        * Fast external failover; peer last-reset; withdraw-storm guard
        * Unknown transitive attribute propagation (RFC 4271 §9)
        * Per-VRF redistribute (connected / static / IGP), IPv6 VRF
          neighbors, eBGP VRF peers; Inter-AS Option B transit label
        * Encode-side clamps for capabilities and attributes (security
          audit follow-up); soft-out stale update-group cache fix

    - note: |
        ### VTY access control
        * Per-session RBAC (View / Operator / Admin) keyed on SO_PEERCRED
          (uid + parent PID) with procfs validation and idle-TTL session GC
        * `enable` authenticates via PAM (the capability-scoped `vtypam`
          helper) and holds Admin on a sliding idle TTL with a hard cap;
          per-uid enable rate-limiting; TACACS+ supported through PAM
        * Root (uid 0) is implicitly Admin; members of the `zebra-rs` Linux
          group run `enable` / `configure` with no password; everyone else
          authenticates the root account via PAM
        * `configure` auto-elevate: root and group members enter configure
          mode silently, non-members are prompted for the root password;
          the package creates the `zebra-rs` group on install

    - note: |
        ### Infrastructure
        * JSON output across show commands (RIB, BGP, OSPF, OSPFv3,
          IS-IS, policy) and interactive `show version`
        * MCP server foundations (stdio); vty tab completion
        * Config: multi-value leaf-list commit fix, activation leaves
          consolidated on `enabled`, tokenizer and format fixes,
          bridge/vxlan ordering, `--config-file` option
        * mdBook documentation expansion (OSPFv2/v3, MUP, VPWS, Lua,
          L3VPN PE-CE, Install / Building, VTY access, supported-RFCs
          appendix); BDD hardening (fail on unmatched steps)

- semver: 26.6.2
