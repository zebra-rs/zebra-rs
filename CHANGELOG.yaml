          programming, link-local / (S,G) filtering, per-VTEP destinations
        * BUM tunnel segmentation (RFC 9572): Type 9/10/11 routes, PMSI codec,
          segmentation bit, Regional Border Router re-origination
        * Assisted Replication (RFC 9574): PMSI tunnel codec
        * EVPN add-path support and capability-teardown fixes

    - note: |
        ### BGP RIB sharding and egress pipeline
        * Lock-free sharded Loc-RIB: per-shard attribute store, adj-in, RIB,
          and label block; peer-membership index; shard-count YANG knob
        * Egress group-task / worker-pool model for update generation
        * Show-read and origination fixes at N>1 shards

    - note: |
        ### BGP (other)
        * Add-path for IPv4/IPv6 unicast, labeled-unicast, VPNv6, EVPN
        * local-as support; table-map extended to IPv6; ip-transparent
        * TCP-AO key rotation/reset; MD5 password reset on running sessions
        * Policy: undefined policy name now denies all; per-AFI policy migration
        * Show-command cleanups and additional tracing knobs

    - note: |
        ### IS-IS
        * TI-LFA SRv6 with classic SID; compute-mode sharding and parallel SPF
        * Flex-Algo SRv6: per-algo locator routing, End.X, VPN/VRF steering
