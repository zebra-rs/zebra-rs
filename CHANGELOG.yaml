        * Dynamic adjacency-SID, address dedup, OSPFv3 LSDB / E-LSA detail show
        * Show grammar: `show ip ospf` -> `show ospf`,
          `show ipv6 ospf` -> `show ospfv3`

    - note: |
        ### Fast reroute / BFD / STAMP
        * Nexthop-protect with kernel failover, switchover, ECMP evict,
          IS-IS/OSPF hooks (dataplane side of TI-LFA)
        * BFD Echo runtime updates; detect-offload for IS-IS and BGP;
          XDP/eBPF expiration offload
        * STAMP (RFC 8762): Phase 1 plus IPv6, SO_TIMESTAMPING, TX errqueue

    - note: |
        ### Infrastructure
        * YANG presence-container / implicit-null sweep; clear-neighbor grammar
        * IPv6 ND flow observation and show commands
        * VXLAN/bridge default handling, interface master
        * FIB tracing (link/route); router-id architecture; docs/mdBook updates

