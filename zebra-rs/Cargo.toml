[package]
name = "zebra-rs"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Reincarnation of GNU Zebra routing suite in Rust"
homepage = "https://zebra.rs"

[lints]
workspace = true

# Debian packaging (cargo-deb). Replaces the former packaging/nfpm-*.yaml.
# `cargo deb -p zebra-rs` reads this table; the version comes straight from
# the workspace `version` above (kept in sync with the top-level `version`
# file by packaging/version-update.sh). Asset source paths are relative to
# this crate directory (zebra-rs/), so out-of-crate files use `../`.
[package.metadata.deb]
maintainer = "Kunihiro Ishiguro <kunihiro@zebra.rs>"
section = "net"
priority = "optional"
# Automatic shared-library Depends (libc6, libpam, ...) via dpkg-shlibdeps
# over the built binaries.
depends = "$auto"
# The eBPF data-plane engine `system ebpf enabled` spawns (/usr/bin/cradle).
# Optional: everything else works without it. The floor is the cradle release
# this zebra-rs targets (the proto/cradle.proto contract), kept in step with
# the top-level `cradle-version` file by version-update.sh; the release /
# publish-apt pipeline ingests exactly that cradle release so
# `apt install zebra-rs` pulls it.
recommends = "cradle-rs (>= 0.9.8)"
# Drop the default `-1` revision so the artifact stays zebra-rs_<ver>_<arch>.deb
# (the CI dist-suffix rename in build-debs.yaml expects that shape).
revision = ""
# Debian-format changelog generated from the single-source CHANGELOG.yaml by
# packaging/changelog-gen.sh (the packaging Makefile runs it before cargo deb).
changelog = "../packaging/out/changelog"
extended-description = """
zebra-rs is a routing software suite reimplementing GNU Zebra in Rust. It
provides BGP, OSPFv2/v3, and IS-IS routing daemons behind a unified YANG-based
configuration model and a VTY-style command shell, and can drive an optional
eBPF data plane (cradle-rs) for offloaded forwarding."""
# Custom maintainer scripts (groupadd/setcap/groupdel). Each carries a
# #DEBHELPER# token where cargo-deb injects the generated systemd fragments.
maintainer-scripts = "../packaging/maintainer"
# The daemon's load/save target (config/manager.rs). Shipped as a documented
# empty default and tracked as a conffile: dpkg keeps the operator- or
# daemon-written config across upgrades and removes it only on purge.
conf-files = ["/etc/zebra-rs/zebra-rs.conf"]
assets = [
  ["target/release/zebra-rs",                    "usr/bin/",                        "755"],
  ["target/release/vtyhelper",                   "usr/bin/",                        "755"],
  ["target/release/vtyctl",                      "usr/bin/",                        "755"],
  ["target/release/vtypam",                      "usr/sbin/",                       "755"],
  ["../vty/vty",                                 "usr/bin/vty",                     "755"],
  ["../etc/pam.d/zebra-rs.example",              "etc/pam.d/zebra-rs.example",      "644"],
  # YANG schemas are program data that must stay in lockstep with the binary,
  # not operator config, so they live under /usr/share (cargo-deb auto-marks
  # everything under /etc as a conffile, which would wrongly persist stale
  # schemas across remove/reinstall). The daemon's default YANG search resolves
  # here on a package install (see main.rs), so the unit needs no --yang-path.
  ["yang/*",                                     "usr/share/zebra-rs/yang/",        "644"],
  # Example Lua policy scripts for the embedded scripting engine (on by
  # default). Read-only reference examples (like the YANG tree), so they live
  # under /usr/share rather than /etc — operators bind them from
  # `router bgp { lua-script <name> { source-path /usr/share/zebra-rs/lua/... } }`,
  # or point source-path at their own scripts elsewhere.
  ["../etc/zebra-rs/lua/*",                      "usr/share/zebra-rs/lua/",         "644"],
  # Documented empty default config (see conf-files above).
  ["../packaging/zebra-rs.conf",                 "etc/zebra-rs/zebra-rs.conf",      "644"],
  # Playset lab topologies (netns example networks). Read-only data under
  # /usr/share; staged into packaging/out/playset by the Makefile to strip
  # runtime artifacts (*.log, *.pid). cargo-deb requires a mode per asset and
  # can't exclude or preserve source modes, and overlapping globs duplicate
  # entries — so the tree is packed as disjoint globs that mirror the source
  # modes exactly: only the up.sh/down.sh lab entry points (run as `./up.sh`)
  # are 0755; the sourced helper scripts and all data are 0644. The Makefile
  # `playset` target fails the build if any file outside this set appears, so
  # a new file/script can never silently go unpackaged.
  #
  # The `[u]p.sh` spelling is load-bearing, not a typo. For a `/`-terminated
  # dest, cargo-deb keeps a match's path relative to the first globbed component
  # only when the *last* segment of the source pattern is itself a glob; when it
  # is a literal name it copies by basename alone (assets.rs `file_name_is_glob`,
  # where is_glob_pattern means "contains one of * [ ] !"). So `**/up.sh` lands
  # every scenario's script on the single path playset/up.sh — 12 files colliding
  # into 1, and lib/ flattened away. Wrapping one character in a class makes the
  # segment a glob that still matches exactly the one file. cargo-deb 2.x kept
  # the subdirectories either way; 3.x is what made this bite (fixed for v26.7.6,
  # first shipped broken by the cargo-deb 3.7.0 bump). packaging/Makefile runs
  # verify-playset-layout.sh over the built .deb so this can't regress silently
  # again — that check is what caught it.
  ["../packaging/out/playset/**/[u]p.sh",        "usr/share/zebra-rs/playset/",     "755"],
  ["../packaging/out/playset/**/[d]own.sh",      "usr/share/zebra-rs/playset/",     "755"],
  ["../packaging/out/playset/**/[t]opology.sh",  "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/out/playset/**/[c]ommon.sh",    "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/out/playset/**/[n]etns.sh",     "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/out/playset/**/[p]layset.sh",   "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/out/playset/**/[z]ebra-rs.sh",  "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/out/playset/**/*.yaml",         "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/out/playset/**/*.json",         "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/out/playset/**/*.md",           "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/out/playset/**/*.drawio",       "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/out/playset/**/*.png",          "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/out/playset/**/*.svg",          "usr/share/zebra-rs/playset/",     "644"],
  ["../packaging/modules-load.d/zebra-rs.conf",  "etc/modules-load.d/zebra-rs.conf", "644"],
]

# systemd unit install/enable/start with restart-after-upgrade. cargo-deb
# adds packaging/systemd/zebra-rs.service as an asset and injects the
# enable/start/restart/stop fragments at the #DEBHELPER# token in the
# maintainer scripts (replaces the former hand-rolled systemctl calls). The
# unit runs a bare `zebra-rs`; its default YANG (/usr/share) and config (/etc)
# search paths resolve the package layout without flags.
[package.metadata.deb.systemd-units]
unit-name = "zebra-rs"
unit-scripts = "../packaging/systemd"
restart-after-upgrade = true

#[profile.release]
#debug = true

[dependencies]
ahash = "0.8"
anyhow.workspace = true
bytes = "1"
mimalloc = "0.1"
ipnet = "2.9"
prost.workspace = true
rayon.workspace = true
tokio.workspace = true
tokio-stream.workspace = true
tonic.workspace = true
tonic-prost.workspace = true
# For dialing the cradle tee over a Linux abstract Unix socket (tonic's
# built-in UDS connector is filesystem-path only). Mirrors vtyhelper.
tower = { version = "0.5", default-features = false, features = ["util"] }
hyper-util = { version = "0.1", features = ["tokio"] }
console-subscriber = "0.5"
libyang = "2"
#libyang = { git = "https://github.com/zebra-rs/libyang", rev = "103b60c2d560a91d37fa26502eb3d495db1cdb99" }
#libyang = { path = "../../libyang" }
regex = "1.10"
similar = "3"
dirs = "6"
async-trait = "0.1"
prefix-trie = "0.9.2"
#prefix-trie = { git = "https://github.com/zebra-rs/prefix-trie" }
thiserror = "2"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }
tracing-appender = "0.2"
syslog = "7"
serde = { version = "1.0", features = ["derive"] }
serde_json = { version = "1.0", features = ["preserve_order"] }
serde_yaml = "0.9"
marked-yaml = "0.7"
ciborium = "0.2"
clap = { version = "4", features = ["derive"] }
alphanumeric-sort = "1.5.3"
bitflags = "2.6.0"
sysctl = "0.7"
socket2 = "0.6"
nix = { version = "0.31", features = ["fs", "net", "socket", "uio", "user"] }
libc = "0.2.167"
bgp-packet = { path = "../crates/bgp-packet" }
bgp-macros = { path = "../crates/bgp-macros" }
ospf-packet = { path = "../crates/ospf-packet" }
ospf-macros = { path = "../crates/ospf-macros" }
isis-packet = { path = "../crates/isis-packet" }
isis-macros = { path = "../crates/isis-macros" }
packet-utils = { path = "../crates/packet-utils" }
pim-packet = { path = "../crates/pim-packet" }
bfd-packet = { path = "../crates/bfd-packet" }
nd-packet = { path = "../crates/nd-packet" }
stamp-packet = { path = "../crates/stamp-packet" }
bitfield-struct = "0.13"
rand = "0.10"
chrono = { version = "0.4", features = ["serde"] }
hostname = "0.4"
bit-vec = "0.9"
audit = "0.7.3"
daemonize = "0.5"
hex = "0.4.3"
strum = "0.28"
strum_macros = "0.28"
num_enum = "0.7.5"
itertools = "0.14.0"
dashmap = "6"
md-5 = "0.11"
sha1 = "0.11"
sha2 = "0.11"
hmac = "0.13"
rs-pfcp = "0.3.1"
# Embedded Lua scripting engine, gated behind the `lua` feature.
# `vendored` bundles the Lua 5.4 interpreter so the build stays hermetic
# (no system liblua) — it does need a C compiler at build time.
mlua = { version = "0.10", features = ["lua54", "vendored"], optional = true }

[features]
# `lua` is DISABLED by default for now: stock builds (and the BDD binary)
# ship WITHOUT the embedded scripting engine, and the hooks compile to
# no-ops via their `#[cfg(not(feature = "lua"))]` stubs. Re-enable the
# scripting engine with `--features lua` (that build is guarded by the
# `lua` CI lane so the optional code keeps compiling).
default = []
# Compile the embedded Lua scripting engine (src/script).
lua = ["dep:mlua"]

[target.'cfg(target_os = "linux")'.dependencies]
rtnetlink = { git = "https://github.com/zebra-rs/rtnetlink", rev = "2d7b1830e9bd9a049a757f0a79ccd16216450bf2" }
#rtnetlink = { path = "../../rtnetlink" }
netlink-sys = "0.8"
netlink-packet-route = { git = "https://github.com/zebra-rs/netlink-packet-route", branch = "seg6" }
netlink-packet-core = "0.7"
# Matches the version netlink-packet-route (seg6) pins, so DefaultNla
# unifies — used to emit kernel bridge MDB SET entries (EVPN SMET).
netlink-packet-utils = "0.5.2"
futures = "0.3"
scan_fmt = "0.2"
procfs = "0.18"

[target.'cfg(target_os = "macos")'.dependencies]
nix = { version = "0.31", features = ["net"] }
ioctl-rs = "0.2.0"
net-route = "0.4.2"

[build-dependencies]
tonic-prost-build.workspace = true
chrono = "0.4"
