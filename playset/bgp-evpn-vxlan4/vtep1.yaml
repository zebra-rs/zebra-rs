interface:
- if-name: vtep1-vtep2
  ipv4:
    address: 192.168.0.1/24
- if-name: vtep1-h1
  bridge: br10
system:
  hostname: vtep1
bridge:
- name: br10
vxlan:
- name: vxlan10
  vni: 10
  local-address: 192.168.0.1
  bridge: br10
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.1
    afi-safi:
    - name: evpn
      advertise-all-vni: true
    neighbor:
    - remote-address: 192.168.0.2
      enabled: true
      remote-as: 65001
      afi-safi:
      - name: ipv4
        enabled: true
      - name: evpn
        enabled: true
