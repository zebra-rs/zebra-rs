# CE3 — customer "cust1", site B (AS 65513). The far end of cust1:
# ce1 pings this router's loopback 172.16.2.1/32 across both ASes.
interface:
- if-name: lo
  ipv4:
    address: 172.16.2.1/32
- if-name: ce3-pe2
  ipv4:
    address: 10.13.0.1/30
system:
  hostname: ce3
router:
  bgp:
    global:
      as: 65513
      router-id: 10.13.0.1
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 10.13.0.2
      remote-as: 65502
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
    afi-safi:
    - name: ipv4
      redistribute:
        connected: {}
