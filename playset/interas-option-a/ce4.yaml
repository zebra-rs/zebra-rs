# CE4 — customer "cust2", site B (AS 65514). Same loopback address as
# CE3 (172.16.2.1/32) on purpose: ce2 pinging 172.16.2.1 must land here,
# not on cust1's ce3.
interface:
- if-name: lo
  ipv4:
    address: 172.16.2.1/32
- if-name: ce4-pe2
  ipv4:
    address: 10.14.0.1/30
system:
  hostname: ce4
router:
  bgp:
    global:
      as: 65514
      router-id: 10.14.0.1
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 10.14.0.2
      remote-as: 65502
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
    afi-safi:
    - name: ipv4
      redistribute:
        connected: {}
