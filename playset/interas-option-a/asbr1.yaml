# ASBR1 — autonomous system border router of AS 65501. The Option A
# node: one VRF per customer, one dedicated inter-AS link per VRF, and
# one plain eBGP IPv4 session per VRF to ASBR2. Toward the inside it is
# just another PE (iBGP VPNv4 to PE1 over loopbacks); toward AS 65502 it
# terminates MPLS completely — the cust1/cust2 links carry unlabeled IP.
vrf:
- name: cust1
  ipv4:
    route-target:
      import:
      - 65501:100
      export:
      - 65501:100
- name: cust2
  ipv4:
    route-target:
      import:
      - 65501:200
      export:
      - 65501:200
interface:
- if-name: lo
  ipv4:
    address: 1.1.1.3/32
- if-name: asbr1-p1
  ipv4:
    address: 10.1.0.6/30
- if-name: asbr1-cust1
  vrf: cust1
  ipv4:
    address: 192.168.1.1/30
- if-name: asbr1-cust2
  vrf: cust2
  ipv4:
    address: 192.168.2.1/30
system:
  hostname: asbr1
router:
  isis:
    net: 49.0001.0000.0000.0003.00
    hostname: asbr1
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 1.1.1.3
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 13
    - if-name: asbr1-p1
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
  bgp:
    global:
      as: 65501
      router-id: 1.1.1.3
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 1.1.1.1
      remote-as: 65501
      timers: {connect-retry-time: 3}
      update-source: 1.1.1.3
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
    vrf:
    - name: cust1
      rd: 65501:1
      neighbor:
      - remote-address: 192.168.1.2
        remote-as: 65502
        afi-safi:
        - name: ipv4
          enabled: true
    - name: cust2
      rd: 65501:2
      neighbor:
      - remote-address: 192.168.2.2
        remote-as: 65502
        afi-safi:
        - name: ipv4
          enabled: true
