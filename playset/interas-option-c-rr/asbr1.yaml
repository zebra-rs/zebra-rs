# ASBR1 — autonomous system border router of AS 65501. Labeled
# loopbacks only, zero VPN state: iBGP labeled-unicast to PE1, PE2, and
# RR1 (each with next-hop-self — THE Option C knob on this leg), eBGP
# labeled-unicast to ASBR2. The RR loopbacks cross the boundary too, so
# the inter-RR multihop session can establish.
interface:
- if-name: lo
  ipv4:
    address: 1.1.1.3/32
- if-name: asbr1-p1
  ipv4:
    address: 10.1.0.6/30
- if-name: asbr1-asbr2
  ipv4:
    address: 192.168.100.1/30
system:
  hostname: asbr1
router:
  isis:
    net: 49.0001.0000.0000.0003.00
    hostname: asbr1
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 1.1.1.3
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 13
    - if-name: asbr1-p1
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
  bgp:
    global:
      as: 65501
      router-id: 1.1.1.3
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 1
    neighbor:
    - remote-address: 1.1.1.1        # PE1 — iBGP labeled-unicast
      remote-as: 65501
      timers: {connect-retry-time: 3}
      update-source: 1.1.1.3
      enabled: true
      afi-safi:
      - name: label-v4
        enabled: true
        next-hop-self: true
    - remote-address: 1.1.1.4        # PE2 — iBGP labeled-unicast
      remote-as: 65501
      timers: {connect-retry-time: 3}
      update-source: 1.1.1.3
      enabled: true
      afi-safi:
      - name: label-v4
        enabled: true
        next-hop-self: true
    - remote-address: 1.1.1.9        # RR1 — iBGP labeled-unicast
      remote-as: 65501
      timers: {connect-retry-time: 3}
      update-source: 1.1.1.3
      enabled: true
      afi-safi:
      - name: label-v4
        enabled: true
        next-hop-self: true
    - remote-address: 192.168.100.2  # ASBR2 — eBGP labeled-unicast
      remote-as: 65502
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: label-v4
        enabled: true
