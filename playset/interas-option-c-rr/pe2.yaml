# PE2 — provider edge, AS 65502. Mirror of PE1: VPNv4 to the local RR2
# only, loopback into label-v4, RTs matching AS 65501's.
vrf:
- name: cust1
  ipv4:
    route-target:
      import:
      - 65501:100
      export:
      - 65501:100
- name: cust2
  ipv4:
    route-target:
      import:
      - 65501:200
      export:
      - 65501:200
interface:
- if-name: lo
  ipv4:
    address: 2.2.2.3/32
- if-name: pe2-p2
  ipv4:
    address: 10.2.0.6/30
- if-name: pe2-ce3
  vrf: cust1
  ipv4:
    address: 10.13.0.2/30
- if-name: pe2-ce4
  vrf: cust2
  ipv4:
    address: 10.14.0.2/30
system:
  hostname: pe2
router:
  isis:
    net: 49.0002.0000.0000.0003.00
    hostname: pe2
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 2.2.2.3
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 23
    - if-name: pe2-p2
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
  bgp:
    global:
      as: 65502
      router-id: 2.2.2.3
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 3
    neighbor:
    - remote-address: 2.2.2.1        # ASBR2 — labeled-unicast
      remote-as: 65502
      timers: {connect-retry-time: 3}
      update-source: 2.2.2.3
      enabled: true
      afi-safi:
      - name: label-v4
        enabled: true
    - remote-address: 2.2.2.9        # RR2 — iBGP VPNv4 (the RR reflects)
      remote-as: 65502
      timers: {connect-retry-time: 3}
      update-source: 2.2.2.3
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
    afi-safi:
    - name: label-v4
      network:
      - prefix: 2.2.2.3/32
    vrf:
    - name: cust1
      rd: 65502:1
      neighbor:
      - remote-address: 10.13.0.1
        remote-as: 65513
        afi-safi:
        - name: ipv4
          enabled: true
    - name: cust2
      rd: 65502:2
      neighbor:
      - remote-address: 10.14.0.1
        remote-as: 65514
        afi-safi:
        - name: ipv4
          enabled: true
