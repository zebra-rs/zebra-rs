# PE2 — second provider edge of AS 65501, serving cust3 (CE3). Same
# pattern as PE1: loopback into label-v4, VPNv4 only to the local RR1
# — which now has two clients, so RFC 4456 client-to-client reflection
# actually runs in this lab.
vrf:
- name: cust3
  ipv4:
    route-target:
      import:
      - 65501:300
      export:
      - 65501:300
interface:
- if-name: lo
  ipv4:
    address: 1.1.1.4/32
- if-name: pe2-ce3
  vrf: cust3
  ipv4:
    address: 10.13.0.2/30
- if-name: pe2-p1
  ipv4:
    address: 10.1.0.9/30
system:
  hostname: pe2
router:
  isis:
    net: 49.0001.0000.0000.0004.00
    hostname: pe2
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 1.1.1.4
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 14
    - if-name: pe2-p1
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
  bgp:
    global:
      as: 65501
      router-id: 1.1.1.4
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 3
    neighbor:
    - remote-address: 1.1.1.3        # ASBR1 — iBGP labeled-unicast
      remote-as: 65501
      timers: {connect-retry-time: 3}
      update-source: 1.1.1.4
      enabled: true
      afi-safi:
      - name: label-v4
        enabled: true
    - remote-address: 1.1.1.9        # RR1 — iBGP VPNv4
      remote-as: 65501
      timers: {connect-retry-time: 3}
      update-source: 1.1.1.4
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
    afi-safi:
    - name: label-v4
      network:
      - prefix: 1.1.1.4/32
    vrf:
    - name: cust3
      rd: 65501:3
      neighbor:
      - remote-address: 10.13.0.1
        remote-as: 65513
        afi-safi:
        - name: ipv4
          enabled: true
