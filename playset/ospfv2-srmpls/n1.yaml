interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: n1-s
  ipv4:
    address: 192.168.0.2/24
- if-name: n1-r1
  ipv4:
    address: 192.168.6.1/24
- if-name: n1-r2
  ipv4:
    address: 192.168.8.1/24
- if-name: n1-d
  ipv4:
    address: 192.168.2.1/24
system:
  hostname: n1
router:
  ospf:
    router-id: 10.0.0.2
    segment-routing:
      mpls: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
        prefix-sid:
          index: 200
      - if-name: n1-s
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: n1-r1
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: n1-r2
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: n1-d
        enabled: true
        network-type: point-to-point
        cost: 1
