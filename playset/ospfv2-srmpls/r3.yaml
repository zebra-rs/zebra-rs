interface:
- if-name: lo
  ipv4:
    address: 10.0.0.7/32
- if-name: r3-r2
  ipv4:
    address: 192.168.9.2/24
- if-name: r3-d
  ipv4:
    address: 192.168.5.2/24
system:
  hostname: r3
router:
  ospf:
    router-id: 10.0.0.7
    segment-routing:
      mpls: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
        prefix-sid:
          index: 700
      - if-name: r3-r2
        enabled: true
        network-type: point-to-point
        cost: 1000
      - if-name: r3-d
        enabled: true
        network-type: point-to-point
        cost: 1
