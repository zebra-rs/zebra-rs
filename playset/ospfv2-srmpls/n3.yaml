interface:
- if-name: lo
  ipv4:
    address: 10.0.0.4/32
- if-name: n3-s
  ipv4:
    address: 192.168.1.2/24
- if-name: n3-r1
  ipv4:
    address: 192.168.10.1/24
system:
  hostname: n3
router:
  ospf:
    router-id: 10.0.0.4
    segment-routing:
      mpls: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
        prefix-sid:
          index: 400
      - if-name: n3-s
        enabled: true
        network-type: point-to-point
        cost: 1000
      - if-name: n3-r1
        enabled: true
        network-type: point-to-point
        cost: 1000
