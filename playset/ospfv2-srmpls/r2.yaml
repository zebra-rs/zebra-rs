interface:
- if-name: lo
  ipv4:
    address: 10.0.0.6/32
- if-name: r2-n1
  ipv4:
    address: 192.168.8.2/24
- if-name: r2-r1
  ipv4:
    address: 192.168.4.2/24
- if-name: r2-r3
  ipv4:
    address: 192.168.9.1/24
system:
  hostname: r2
router:
  ospf:
    router-id: 10.0.0.6
    segment-routing:
      mpls: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
        prefix-sid:
          index: 600
      - if-name: r2-n1
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: r2-r1
        enabled: true
        network-type: point-to-point
        cost: 1000
      - if-name: r2-r3
        enabled: true
        network-type: point-to-point
        cost: 1000
