interface:
- if-name: lo
  ipv4:
    address: 10.0.0.5/32
- if-name: r1-n1
  ipv4:
    address: 192.168.6.2/24
- if-name: r1-n2
  ipv4:
    address: 192.168.7.2/24
- if-name: r1-n3
  ipv4:
    address: 192.168.10.2/24
- if-name: r1-r2
  ipv4:
    address: 192.168.4.1/24
system:
  hostname: r1
router:
  ospf:
    router-id: 10.0.0.5
    segment-routing:
      mpls: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
        prefix-sid:
          index: 500
      - if-name: r1-n1
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: r1-n2
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: r1-n3
        enabled: true
        network-type: point-to-point
        cost: 1000
      - if-name: r1-r2
        enabled: true
        network-type: point-to-point
        cost: 1000
