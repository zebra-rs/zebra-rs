# ASBR2 — autonomous system border router of AS 65502. Mirror of ASBR1:
# per-customer transit VRFs (no interfaces, no per-VRF sessions) marked
# inter-as-hybrid, one eBGP VPNv4 session to ASBR1, iBGP VPNv4 to PE3.
vrf:
- name: cust1
  ipv4:
    route-target:
      import:
      - 65501:100
      export:
      - 65501:100
- name: cust2
  ipv4:
    route-target:
      import:
      - 65501:200
      export:
      - 65501:200
- name: cust3
  ipv4:
    route-target:
      import:
      - 65501:300
      export:
      - 65501:300
interface:
- if-name: lo
  ipv4:
    address: 2.2.2.1/32
- if-name: asbr2-asbr1
  ipv4:
    address: 192.168.100.2/30
- if-name: asbr2-p2
  ipv4:
    address: 10.2.0.1/30
system:
  hostname: asbr2
router:
  isis:
    net: 49.0002.0000.0000.0001.00
    hostname: asbr2
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 2.2.2.1
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 21
    - if-name: asbr2-p2
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
  bgp:
    global:
      as: 65502
      router-id: 2.2.2.1
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 1
    neighbor:
    - remote-address: 2.2.2.3        # PE3 — iBGP VPNv4 (no next-hop-self!)
      remote-as: 65502
      timers: {connect-retry-time: 3}
      update-source: 2.2.2.1
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
    - remote-address: 192.168.100.1  # ASBR1 — ONE eBGP VPNv4, all customers
      remote-as: 65501
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
    vrf:
    - name: cust1
      rd: 65502:11
      inter-as-hybrid: true
    - name: cust2
      rd: 65502:12
      inter-as-hybrid: true
    - name: cust3
      rd: 65502:13
      inter-as-hybrid: true
