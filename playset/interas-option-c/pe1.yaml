# PE1 — provider edge, AS 65501. The Option C PE peers VPNv4 DIRECTLY
# with the remote AS's PE (multihop eBGP to pe2's loopback 2.2.2.3) —
# no ASBR ever sees a VPN route. Its own loopback is originated into
# BGP labeled-unicast (label-v4) so the ASBR chain can export it to
# AS 65502; the remote loopback learned the same way is what makes the
# multihop session (and the VPN next-hop) resolvable, as a labeled path.
# RTs are coordinated with AS 65502 (65501:100 / 65501:200), as in the
# Option B playset.
vrf:
- name: cust1
  ipv4:
    route-target:
      import:
      - 65501:100
      export:
      - 65501:100
- name: cust2
  ipv4:
    route-target:
      import:
      - 65501:200
      export:
      - 65501:200
interface:
- if-name: lo
  ipv4:
    address: 1.1.1.1/32
- if-name: pe1-ce1
  vrf: cust1
  ipv4:
    address: 10.11.0.2/30
- if-name: pe1-ce2
  vrf: cust2
  ipv4:
    address: 10.12.0.2/30
- if-name: pe1-p1
  ipv4:
    address: 10.1.0.1/30
system:
  hostname: pe1
router:
  isis:
    net: 49.0001.0000.0000.0001.00
    hostname: pe1
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 1.1.1.1
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 11
    - if-name: pe1-p1
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
  bgp:
    global:
      as: 65501
      router-id: 1.1.1.1
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 3
    neighbor:
    - remote-address: 1.1.1.3
      remote-as: 65501
      timers: {connect-retry-time: 3}
      update-source: 1.1.1.1
      enabled: true
      afi-safi:
      - name: label-v4
        enabled: true
    - remote-address: 2.2.2.3
      remote-as: 65502
      ebgp-multihop: 10
      timers: {connect-retry-time: 3}
      update-source: 1.1.1.1
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
    afi-safi:
    - name: label-v4
      network:
      - prefix: 1.1.1.1/32
    vrf:
    - name: cust1
      rd: 65501:1
      neighbor:
      - remote-address: 10.11.0.1
        remote-as: 65511
        afi-safi:
        - name: ipv4
          enabled: true
    - name: cust2
      rd: 65501:2
      neighbor:
      - remote-address: 10.12.0.1
        remote-as: 65512
        afi-safi:
        - name: ipv4
          enabled: true
