interface:
- if-name: vtep3-vtep1
  ipv4:
    address: 192.168.1.2/24
- if-name: vtep3-h3
  bridge: br20
system:
  hostname: vtep3
bridge:
- name: br20
vxlan:
- name: vxlan20
  vni: 20
  local-address: 192.168.1.2
  bridge: br20
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.1.2
    afi-safi:
    - name: evpn
      advertise-all-vni: true
    neighbor:
    - remote-address: 192.168.1.1
      enabled: true
      remote-as: 65001
      afi-safi:
      - name: ipv4
        enabled: true
      - name: evpn
        enabled: true
