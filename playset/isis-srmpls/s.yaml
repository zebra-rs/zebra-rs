interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
- if-name: s-e1
  ipv4:
    address: 172.16.0.2/24
- if-name: s-n1
  ipv4:
    address: 192.168.0.1/24
- if-name: s-n2
  ipv4:
    address: 192.168.3.1/24
- if-name: s-n3
  ipv4:
    address: 192.168.1.1/24
system:
  hostname: s
router:
  isis:
    net: 49.0000.0000.0000.0001.00
    hostname: s
    is-type: level-2-only
    segment-routing:
      mpls: {}
    te-router-id: 10.0.0.1
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 100
    - if-name: s-n1
      ipv4:
        enabled: true
      metric: 1
    - if-name: s-n2
      ipv4:
        enabled: true
      metric: 1
    - if-name: s-n3
      ipv4:
        enabled: true
      metric: 1000
  static:
    ipv4:
      route:
      - prefix: 172.16.1.0/24
        nexthop:
        - address: 10.0.0.8
