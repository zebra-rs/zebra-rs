<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 830 340" font-family="Helvetica, Arial, sans-serif">
  <!-- Inter-AS Option C (labeled loopbacks between ASBRs, PE-to-PE VPNv4)
       — matches playset/interas-option-c.
       Editable source: InterASOptionC.drawio (re-export from draw.io replaces this file). -->
  <rect width="830" height="340" fill="#ffffff"/>

  <!-- multihop eBGP VPNv4 session, PE to PE, over everyone's heads -->
  <path d="M 165,150 Q 415,-100 665,150" fill="none" stroke="#B8860B" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="415" y="18" text-anchor="middle" font-size="9" fill="#B8860B">multihop eBGP VPNv4 (PE to PE)</text>

  <!-- AS boxes -->
  <rect x="90" y="50" width="270" height="230" rx="8" fill="none" stroke="#999999" stroke-dasharray="6,4"/>
  <rect x="480" y="50" width="270" height="230" rx="8" fill="none" stroke="#999999" stroke-dasharray="6,4"/>
  <text x="225" y="68" text-anchor="middle" font-size="12" fill="#333333">AS 65501</text>
  <text x="615" y="68" text-anchor="middle" font-size="12" fill="#333333">AS 65502</text>

  <!-- provider clouds -->
  <path d="M 170,215 C 140,220 120,195 135,170 C 115,145 135,115 165,125 C 175,100 215,95 235,115 C 260,100 295,115 295,140 C 320,150 315,185 290,195 C 285,215 250,225 230,212 C 215,225 185,225 170,215 Z"
        fill="none" stroke="#bbbbbb"/>
  <path d="M 510,215 C 480,220 460,195 475,170 C 455,145 475,115 505,125 C 515,100 555,95 575,115 C 600,100 635,115 635,140 C 660,150 655,185 630,195 C 625,215 590,225 570,212 C 555,225 525,225 510,215 Z"
        fill="none" stroke="#bbbbbb"/>

  <!-- CE-PE links -->
  <line x1="60" y1="127.5" x2="165" y2="165" stroke="#0499D4" stroke-width="1.5"/>
  <line x1="60" y1="197.5" x2="165" y2="165" stroke="#4DA72E" stroke-width="1.5"/>
  <line x1="665" y1="165" x2="770" y2="127.5" stroke="#0499D4" stroke-width="1.5"/>
  <line x1="665" y1="165" x2="770" y2="197.5" stroke="#4DA72E" stroke-width="1.5"/>

  <!-- intra-AS core links -->
  <line x1="165" y1="165" x2="245" y2="165" stroke="#A02C93" stroke-width="1.5"/>
  <line x1="245" y1="165" x2="325" y2="165" stroke="#A02C93" stroke-width="1.5"/>
  <line x1="505" y1="165" x2="585" y2="165" stroke="#A02C93" stroke-width="1.5"/>
  <line x1="585" y1="165" x2="665" y2="165" stroke="#A02C93" stroke-width="1.5"/>

  <!-- inter-AS link: BGP-LU only, PE loopbacks with labels -->
  <line x1="340" y1="165" x2="490" y2="165" stroke="#E97131" stroke-width="2.5"/>
  <text x="415" y="155" text-anchor="middle" font-size="9" fill="#E97131">eBGP labeled-unicast (BGP-LU)</text>

  <!-- routers -->
  <g stroke="#0E9ED5" stroke-width="1.5" fill="#ffffff">
    <circle cx="165" cy="165" r="15"/>
    <circle cx="245" cy="165" r="15"/>
    <circle cx="325" cy="165" r="15"/>
    <circle cx="505" cy="165" r="15"/>
    <circle cx="585" cy="165" r="15"/>
    <circle cx="665" cy="165" r="15"/>
  </g>
  <g text-anchor="middle" font-size="8" fill="#333333">
    <text x="165" y="168">pe1</text>
    <text x="245" y="168">p1</text>
    <text x="325" y="168">asbr1</text>
    <text x="505" y="168">asbr2</text>
    <text x="585" y="168">p2</text>
    <text x="665" y="168">pe2</text>
  </g>

  <!-- customer edges -->
  <g font-size="9" text-anchor="middle" fill="#ffffff">
    <rect x="20" y="115" width="40" height="25" rx="5" fill="#0499D4"/>
    <text x="40" y="131">ce1</text>
    <rect x="20" y="185" width="40" height="25" rx="5" fill="#4DA72E"/>
    <text x="40" y="201">ce2</text>
    <rect x="770" y="115" width="40" height="25" rx="5" fill="#0499D4"/>
    <text x="790" y="131">ce3</text>
    <rect x="770" y="185" width="40" height="25" rx="5" fill="#4DA72E"/>
    <text x="790" y="201">ce4</text>
  </g>

  <!-- data plane bands: labeled end to end, three labels deep at ingress -->
  <g font-size="11" text-anchor="middle">
    <rect x="25" y="303" width="110" height="20" fill="none" stroke="#999999"/>
    <text x="80" y="317" fill="#333333">IP</text>
    <rect x="150" y="303" width="190" height="20" rx="10" fill="#99CCFF" stroke="#808080"/>
    <text x="245" y="317" fill="#000000">MPLS</text>
    <rect x="352" y="303" width="135" height="20" rx="10" fill="#FBE5D6" stroke="#808080"/>
    <text x="419" y="317" fill="#000000">MPLS</text>
    <rect x="500" y="303" width="190" height="20" rx="10" fill="#A5E798" stroke="#808080"/>
    <text x="595" y="317" fill="#000000">MPLS</text>
    <rect x="702" y="303" width="110" height="20" fill="none" stroke="#999999"/>
    <text x="757" y="317" fill="#333333">IP</text>
  </g>
</svg>
