<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 260" font-family="Helvetica, Arial, sans-serif">
  <!-- TI-LFA example network (RFC 9855) with two edge hosts — matches the
       SR-MPLS / SRv6 TI-LFA playsets.
       Editable source: TI-LFA.drawio (re-export from draw.io replaces this file). -->
  <rect width="540" height="260" fill="#ffffff"/>

  <!-- IGP domain -->
  <rect x="90" y="30" width="360" height="200" rx="15" fill="none" stroke="#999999" stroke-dasharray="6,4"/>

  <!-- core links (drawn first; node circles overpaint the N2-R3 through-line
       so it reads as the N2-R1, R1-R2, R2-R3 chain) -->
  <g stroke="#A02C93" stroke-width="1">
    <line x1="150" y1="65" x2="254" y2="65"/>
    <line x1="284" y1="65" x2="388" y2="65"/>
    <line x1="135" y1="80" x2="135" y2="190"/>
    <line x1="150" y1="80" x2="188.4" y2="123.8"/>
    <line x1="213.8" y1="131.5" x2="389" y2="132"/>
    <line x1="148.8" y1="199.5" x2="255.4" y2="139.2"/>
    <line x1="284" y1="80" x2="325.4" y2="121.4"/>
    <line x1="269" y1="80" x2="269" y2="117"/>
    <line x1="403.7" y1="80" x2="403.7" y2="117"/>
  </g>

  <!-- edge host links -->
  <g stroke="#0499D4" stroke-width="1">
    <line x1="60" y1="65" x2="120" y2="65"/>
    <line x1="418" y1="64.5" x2="481" y2="64"/>
  </g>

  <!-- routers -->
  <g stroke="#0E9ED5" stroke-width="1" fill="#ffffff">
    <circle cx="135" cy="65" r="15"/>
    <circle cx="269" cy="65" r="15"/>
    <circle cx="403" cy="65" r="15"/>
    <circle cx="201" cy="132" r="15"/>
    <circle cx="269" cy="132" r="15"/>
    <circle cx="336" cy="132" r="15"/>
    <circle cx="404" cy="132" r="15"/>
    <circle cx="135" cy="205" r="15"/>
  </g>
  <g text-anchor="middle" font-size="8" fill="#000000">
    <text x="135" y="68">S</text>
    <text x="269" y="68">N1</text>
    <text x="403" y="68">D</text>
    <text x="201" y="135">N2</text>
    <text x="269" y="135">R1</text>
    <text x="336" y="135">R2</text>
    <text x="404" y="135">R3</text>
    <text x="135" y="208">N3</text>
  </g>

  <!-- edge hosts -->
  <g font-size="8" text-anchor="middle" fill="#ffffff">
    <rect x="20" y="53" width="40" height="25" rx="5" fill="#0499D4"/>
    <text x="40" y="68">E1</text>
    <rect x="481" y="51.5" width="40" height="25" rx="5" fill="#0499D4"/>
    <text x="501" y="67">E2</text>
  </g>

  <!-- IGP metrics -->
  <g text-anchor="middle" font-size="9" font-weight="bold" fill="#A02C93">
    <text x="203" y="59">1</text>
    <text x="340" y="59">1</text>
    <text x="177" y="101">1</text>
    <text x="275" y="102">1</text>
    <text x="314" y="101">1</text>
    <text x="410" y="101">1</text>
    <text x="234" y="126">1</text>
    <text x="121" y="136">1000</text>
    <text x="302" y="144">1000</text>
    <text x="371" y="145">1000</text>
    <text x="218" y="178">1000</text>
  </g>
</svg>
