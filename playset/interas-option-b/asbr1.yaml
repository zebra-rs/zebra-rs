# ASBR1 — autonomous system border router of AS 65501. The Option B
# node: NO VRFs at all. Every VPN route lives in the global VPNv4 RIB.
#  - eBGP VPNv4 directly to ASBR2 over the inter-AS link — labeled VPNv4
#    NLRI (RFC 8277) crosses the boundary; the link is in the GLOBAL
#    table and not in the IGP, and it carries MPLS.
#  - iBGP VPNv4 to PE1 and PE2 (one session per PE) with
#    `next-hop-self`: a route re-advertised from AS 65502 must reach the
#    PEs carrying ASBR1's IGP-reachable loopback (and ASBR1's freshly
#    allocated swap label), not the inter-AS link address ASBR2 set as
#    next hop.
#  - For each re-advertised route the ASBR allocates a local label and
#    installs a swap ILM (local label -> received label, toward the
#    original next hop) — the VPN crosses the border as a label switch.
interface:
- if-name: lo
  ipv4:
    address: 1.1.1.3/32
- if-name: asbr1-p1
  ipv4:
    address: 10.1.0.6/30
- if-name: asbr1-asbr2
  ipv4:
    address: 192.168.100.1/30
system:
  hostname: asbr1
router:
  isis:
    net: 49.0001.0000.0000.0003.00
    hostname: asbr1
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 1.1.1.3
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 13
    - if-name: asbr1-p1
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
  bgp:
    global:
      as: 65501
      router-id: 1.1.1.3
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 1
    neighbor:
    - remote-address: 1.1.1.1
      remote-as: 65501
      timers: {connect-retry-time: 3}
      update-source: 1.1.1.3
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
        next-hop-self: true
    - remote-address: 1.1.1.4
      remote-as: 65501
      timers: {connect-retry-time: 3}
      update-source: 1.1.1.3
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
        next-hop-self: true
    - remote-address: 192.168.100.2
      remote-as: 65502
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
