interface:
- if-name: lo
  ipv6:
    address: 2001:db8::7/128
- if-name: r3-r2
  ipv6:
    address: 2001:db8:9::2/64
- if-name: r3-d
  ipv6:
    address: 2001:db8:11::1/64
system:
  hostname: r3
segment-routing:
  locator:
  - name: LOC7
    prefix: fcbb:bbbb:7::/48
    behavior: usid
router:
  ospfv3:
    router-id: 10.0.0.7
    segment-routing:
      srv6:
        locator: LOC7
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: r3-r2
        enabled: true
        network-type: point-to-point
        cost: 1000
      - if-name: r3-d
        enabled: true
        network-type: point-to-point
        cost: 1
