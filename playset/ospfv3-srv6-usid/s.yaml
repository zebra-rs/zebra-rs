interface:
- if-name: lo
  ipv6:
    address: 2001:db8::1/128
- if-name: s-n1
  ipv6:
    address: 2001:db8:1::1/64
- if-name: s-n2
  ipv6:
    address: 2001:db8:2::1/64
- if-name: s-n3
  ipv6:
    address: 2001:db8:3::1/64
- if-name: s-e1
  ipv6:
    address: 2001:db8:100::1/64
system:
  hostname: s
segment-routing:
  locator:
  - name: LOC1
    prefix: fcbb:bbbb:1::/48
    behavior: usid
router:
  ospfv3:
    router-id: 10.0.0.1
    segment-routing:
      srv6:
        locator: LOC1
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: s-n1
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: s-n2
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: s-n3
        enabled: true
        network-type: point-to-point
        cost: 1000
  bgp:
    global:
      as: 65000
      router-id: 10.0.0.1
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 1
    segment-routing:
      srv6:
        locator: LOC1
        ipv6-unicast: {}
    neighbor:
    - remote-address: 2001:db8::8
      remote-as: 65000
      update-source: 2001:db8::1
      enabled: true
      afi-safi:
      - name: ipv6
        enabled: true
        encapsulation-type: srv6
    afi-safi:
    - name: ipv6
      redistribute:
        connected: {}
