interface:
- if-name: vtep1-vtep2
  ipv6:
    address: 2001:db8:ff::1/64
- if-name: vtep1-vtep3
  ipv6:
    address: 2001:db8:ee::1/64
- if-name: vtep1-h1
  bridge: br10
- if-name: vtep1-h4
  bridge: br20
system:
  hostname: vtep1
bridge:
- name: br10
- name: br20
vxlan:
- name: vxlan10
  vni: 10
  local-address: 2001:db8:ff::1
  bridge: br10
- name: vxlan20
  vni: 20
  local-address: 2001:db8:ee::1
  bridge: br20
router:
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.1
    afi-safi:
    - name: evpn
      advertise-all-vni: true
    neighbor:
    - remote-address: 2001:db8:ff::2
      enabled: true
      remote-as: 65001
      afi-safi:
      - name: evpn
        enabled: true
    - remote-address: 2001:db8:ee::2
      enabled: true
      remote-as: 65001
      afi-safi:
      - name: evpn
        enabled: true
