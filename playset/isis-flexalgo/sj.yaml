interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: sj-se
  ipv4:
    address: 192.168.1.2/24
- if-name: sj-sy
  ipv4:
    address: 192.168.3.1/24
- if-name: sj-da
  ipv4:
    address: 192.168.4.1/24
- if-name: sj-ch
  ipv4:
    address: 192.168.5.1/24
- if-name: sj-tk
  ipv4:
    address: 192.168.6.1/24
system:
  hostname: sj
affinity-map:
  affinity:
  - name: trans-pacific
    bit-position: 0
router:
  isis:
    net: 49.0000.0000.0000.0002.00
    hostname: sj
    is-type: level-2-only
    segment-routing:
      mpls: {}
    te-router-id: 10.0.0.2
    flex-algo:
    - algo: 128
      metric-type: igp
      dataplane:
        sr-mpls: true
      affinity:
        exclude-any:
        - trans-pacific
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 200
        flex-algo-prefix-sid:
        - algo: 128
          index: 2200
    - if-name: sj-se
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
    - if-name: sj-sy
      network-type: point-to-point
      affinity:
      - trans-pacific
      ipv4:
        enabled: true
      metric: 10
    - if-name: sj-da
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
    - if-name: sj-ch
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
    - if-name: sj-tk
      network-type: point-to-point
      affinity:
      - trans-pacific
      ipv4:
        enabled: true
      metric: 10
