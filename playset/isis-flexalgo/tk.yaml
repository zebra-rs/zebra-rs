interface:
- if-name: lo
  ipv4:
    address: 10.0.0.11/32
- if-name: tk-sj
  ipv4:
    address: 192.168.6.2/24
- if-name: tk-sg
  ipv4:
    address: 192.168.15.2/24
system:
  hostname: tk
affinity-map:
  affinity:
  - name: trans-pacific
    bit-position: 0
router:
  isis:
    net: 49.0000.0000.0000.0011.00
    hostname: tk
    is-type: level-2-only
    segment-routing:
      mpls: {}
    te-router-id: 10.0.0.11
    flex-algo:
    - algo: 128
      metric-type: igp
      dataplane:
        sr-mpls: true
      affinity:
        exclude-any:
        - trans-pacific
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 1100
        flex-algo-prefix-sid:
        - algo: 128
          index: 3100
    - if-name: tk-sj
      network-type: point-to-point
      affinity:
      - trans-pacific
      ipv4:
        enabled: true
      metric: 10
    - if-name: tk-sg
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
