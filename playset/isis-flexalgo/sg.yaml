interface:
- if-name: lo
  ipv4:
    address: 10.0.0.9/32
- if-name: sg-se
  ipv4:
    address: 192.168.0.2/24
- if-name: sg-fr
  ipv4:
    address: 192.168.14.2/24
- if-name: sg-tk
  ipv4:
    address: 192.168.15.1/24
- if-name: sg-sy
  ipv4:
    address: 192.168.16.1/24
system:
  hostname: sg
affinity-map:
  affinity:
  - name: trans-pacific
    bit-position: 0
router:
  isis:
    net: 49.0000.0000.0000.0009.00
    hostname: sg
    is-type: level-2-only
    segment-routing:
      mpls: {}
    te-router-id: 10.0.0.9
    flex-algo:
    - algo: 128
      advertise-definition: true
      metric-type: igp
      dataplane:
        sr-mpls: true
      affinity:
        exclude-any:
        - trans-pacific
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 900
        flex-algo-prefix-sid:
        - algo: 128
          index: 2900
    - if-name: sg-se
      network-type: point-to-point
      affinity:
      - trans-pacific
      ipv4:
        enabled: true
      metric: 10
    - if-name: sg-fr
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
    - if-name: sg-tk
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
    - if-name: sg-sy
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
