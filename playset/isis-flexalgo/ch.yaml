interface:
- if-name: lo
  ipv4:
    address: 10.0.0.3/32
- if-name: ch-se
  ipv4:
    address: 192.168.2.2/24
- if-name: ch-sj
  ipv4:
    address: 192.168.5.2/24
- if-name: ch-da
  ipv4:
    address: 192.168.7.1/24
- if-name: ch-va
  ipv4:
    address: 192.168.8.1/24
- if-name: ch-ln
  ipv4:
    address: 192.168.9.1/24
system:
  hostname: ch
affinity-map:
  affinity:
  - name: trans-pacific
    bit-position: 0
router:
  isis:
    net: 49.0000.0000.0000.0003.00
    hostname: ch
    is-type: level-2-only
    segment-routing:
      mpls: {}
    te-router-id: 10.0.0.3
    flex-algo:
    - algo: 128
      advertise-definition: true
      metric-type: igp
      dataplane:
        sr-mpls: true
      affinity:
        exclude-any:
        - trans-pacific
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 300
        flex-algo-prefix-sid:
        - algo: 128
          index: 2300
    - if-name: ch-se
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
    - if-name: ch-sj
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
    - if-name: ch-da
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
    - if-name: ch-va
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
    - if-name: ch-ln
      network-type: point-to-point
      ipv4:
        enabled: true
      metric: 10
