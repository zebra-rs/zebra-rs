name: Nightly Build

on:
  schedule:
    - cron: '0 18 * * *'    # 03:00 JST (UTC 18:00)
  workflow_dispatch:

permissions:
  contents: write           # Required to push the nightly tag and release

jobs:
  build:
    uses: ./.github/workflows/build-debs.yaml
    with:
      nightly: true

  # =====================================================================
  # Single 'nightly' release: all six .debs for direct download
  # =====================================================================
  release:
    name: Publish Nightly Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0    # Needed to move tags

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: deb-*
          merge-multiple: true

      - name: List collected .deb files
        run: ls -la artifacts/

      - name: Force-move nightly tag to current commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f nightly
          git push -f origin nightly

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build"
          prerelease: true
          body: |
            Nightly build from commit ${{ github.sha }}

            ## Downloads

            Choose the file matching your Ubuntu version and architecture:

            | Ubuntu             | x86_64                   | ARM64                    |
            |--------------------|--------------------------|--------------------------|
            | 22.04 (jammy)      | `*-jammy_amd64.deb`      | `*-jammy_arm64.deb`      |
            | 24.04 (noble)      | `*-noble_amd64.deb`      | `*-noble_arm64.deb`      |
            | 26.04 (resolute)   | `*-resolute_amd64.deb`   | `*-resolute_arm64.deb`   |

            Or install via apt (nightly channel): https://zebra.rs/apt/
          files: artifacts/*.deb

  # =====================================================================
  # Per-codename nightly-<codename> flat APT repositories (nightly channel)
  # =====================================================================
  publish-apt:
    name: Publish nightly APT repo
    needs: build
    if: ${{ vars.APT_PUBLISH_ENABLED == 'true' }}
    uses: ./.github/workflows/publish-apt.yaml
    with:
      channel: nightly
      prerelease: true
    secrets: inherit
