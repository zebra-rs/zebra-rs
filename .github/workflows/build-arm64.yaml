name: Build for arm64

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for arm64
    runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      # `make -C packaging` builds the XDP BFD Echo reflector (offload/), which
      # compiles to bpfel-unknown-none and needs a nightly toolchain + rust-src
      # and bpf-linker (which links against LLVM). Versions match the locally
      # validated combo: bpf-linker 0.10.3 / LLVM 18.1.
      - name: Install XDP/eBPF toolchain
        run: |
          rustup toolchain install nightly --component rust-src
          wget -qO /tmp/llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x /tmp/llvm.sh
          sudo /tmp/llvm.sh 18
          echo "/usr/lib/llvm-18/bin" >> "$GITHUB_PATH"
          export PATH="/usr/lib/llvm-18/bin:$PATH"
          cargo install bpf-linker --version 0.10.3 --locked

      - name: Build vty
        run: |
          sudo apt update -y
          sudo apt upgrade -y
          sudo apt install -y protobuf-compiler libnanomsg-dev bison libpam0g-dev
          make -C vty
          echo 'deb [trusted=yes] https://repo.goreleaser.com/apt/ /' | sudo tee /etc/apt/sources.list.d/goreleaser.list
          sudo apt update
          sudo apt install nfpm
          make -C packaging arm64

      - name: Upload basefs artifact
        uses: actions/upload-artifact@v4
        with:
          name: zebra-rs-arm64
          path: |
            ./packaging/*.deb
