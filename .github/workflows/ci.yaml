name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: cargo fmt
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --all -- --check

  clippy:
    name: cargo clippy
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libpam0g-dev
      - name: Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: cargo test
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libpam0g-dev
      - name: Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Test
        # The bdd crate's cucumber tests require root + Linux network
        # namespaces and are not runnable in the GitHub Actions sandbox;
        # exclude them here. They are intended to be run locally.
        run: cargo test --workspace --exclude bdd

  lua:
    name: cargo clippy (lua)
    runs-on: ubuntu-22.04
    # The `lua` feature is DISABLED by default for now, so the fmt /
    # clippy / test jobs build the feature-OFF path (the hooks'
    # `#[cfg(not(feature = "lua"))]` no-op stubs). This lane guards the
    # OTHER direction: that the embedded scripting engine still compiles
    # cleanly with `--features lua`, so the optional code doesn't rot
    # while it is off.
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libpam0g-dev
      - name: Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: Clippy (lua feature)
        run: cargo clippy -p zebra-rs --features lua --all-targets -- -D warnings
