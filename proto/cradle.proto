syntax = "proto3";

// cradle-rs data-plane control API.
//
// This is the seam between a routing control plane (ultimately zebra-rs's
// FibHandle backend) and the eBPF data plane. Interface references are by name;
// the server resolves them to ifindex and attaches the datapath to ports on
// demand.
package cradle.v1;

message Empty {}

message Port {
  string name = 1;  // interface name
  string mac = 2;   // empty => read from the interface
  bool l3 = 3;      // routed port; false => L2 bridge member in `vlan`
  uint32 vlan = 4;
  uint32 vrf_id = 5;  // VRF table for L3 ports (0 = global)
}

message L2Domain {
  uint32 vlan = 1;
  repeated string members = 2;  // interface names flooded within the domain
}

message Nexthop {
  uint32 id = 1;
  string gateway = 2;     // empty => on-link / connected
  string oif = 3;         // output interface name (used when oif_index == 0)
  uint32 oif_index = 4;   // output ifindex; preferred when non-zero
  bool v6 = 5;            // IPv6 nexthop (gateway parsed as IPv6)
  repeated uint32 labels = 6;  // MPLS out-label stack, [0] = outermost
  repeated string segs = 7;    // SRv6 SID list, forwarding order ([0] = outer DA)
  uint32 encap_mode = 8;       // H.Encap | H.Encap.Red (carried; Phase 1 = reduced)
}

// A nexthop group for ECMP: ordered member nexthop ids. A route whose flags
// include FIB_F_ECMP and whose nexthop_id is this group's id load-balances over
// the members.
message NexthopGroup {
  uint32 id = 1;
  repeated uint32 members = 2;
}

message Route4 {
  string prefix = 1;   // "a.b.c.d/len"
  uint32 nexthop_id = 2;
  uint32 flags = 3;
  uint32 vrf_table_id = 4;  // 0 = global (mirrors Ilm.vrf_table_id)
}

message Route4Del {
  string prefix = 1;
  uint32 vrf_table_id = 2;
}

// Bulk route install — the initial-load path. In dir24 mode each affected
// /24 block is recomputed once per batch instead of once per route.
message Route4Batch {
  repeated Route4 routes = 1;
}

message FibSummaryRequest {}

// IPv4 FIB engine state (`cradle ctl fib`).
message FibSummary {
  string fib4_mode = 1;  // "lpm" | "dir24"
  uint64 routes4 = 2;    // dir24 shadow route count (0 in lpm mode)
  uint32 tbl8_used = 3;
  uint32 tbl8_free = 4;
}

message Route6 {
  string prefix = 1;   // "addr/len"
  uint32 nexthop_id = 2;
  uint32 flags = 3;
  uint32 vrf_table_id = 4;  // 0 = global (feeds FIB6_VRF)
}

message Route6Del {
  string prefix = 1;
  uint32 vrf_table_id = 2;
}

// An SRv6 local SID (seg6local) — mirrors zebra's route_sid_install. Phase 1
// implements the End.DT4/DT6/DT46 behaviors; other fields are carried so
// later phases (End.X, uN/uA, End.B6) need no ABI break.
message LocalSid {
  string sid          = 1;   // SID address (or locator prefix for uSID)
  uint32 prefix_len   = 2;   // /128 for End/End.X/End.DT*; masked for uSID
  uint32 behavior     = 3;   // SRV6_BH_* value
  uint32 vrf_table_id = 4;   // End.DT* table (0 = global)
  uint32 oif          = 5;   // seg6 device (End/uN) or egress link (End.X)
  string nh6          = 6;   // adjacency IPv6 for End.X / uA
  uint32 lb_bits = 7; uint32 ln_bits = 8; uint32 fun_bits = 9; uint32 arg_bits = 10;
  uint32 nexthop_id = 11;    // cross-connect adjacency for End.X (into NEXTHOPS)
}

message LocalSidDel {
  string sid = 1;
  uint32 prefix_len = 2;
}

message Srv6EncapSource { string addr = 1; }  // outer IPv6 SA for H.Encaps

// EVPN-over-SRv6 overlay FDB entry: MAC `mac` in bridge domain `bd` sits
// behind the remote PE's End.DT2U/DT2M service SID. `nexthop_id` selects the
// underlay adjacency; 0 = resolve by a FIB6 lookup on `remote_sid` in the
// datapath (the control plane doesn't need to pre-resolve). The all-ones MAC
// is the per-BD BUM sentinel (remote End.DT2M).
message FdbRemote {
  string mac        = 1;
  uint32 bd         = 2;
  string remote_sid = 3;
  uint32 nexthop_id = 4;
}

message FdbRemoteDel {
  string mac = 1;
  uint32 bd  = 2;
}

// A BUM ingress-replication slot: one remote PE in bridge domain `bd`,
// reached by MAC-in-SRv6 toward its End.DT2M `remote_sid`. cradle manages
// the slot's plumbing itself (a veth pair in the flood list whose far end
// per-copy encapsulates — see docs/design/evpn-srv6.md). Idempotent per
// (bd, remote_sid). The EVPN Type-3 tee drives these; a bridge domain using
// slots must not also program the all-ones-MAC sentinel.
message ReplSlot {
  uint32 bd         = 1;
  string remote_sid = 2;
}

// Subscribe to datapath MAC learning (EVPN over SRv6): cradle streams every
// locally-learned (mac, bridge-domain) so the control plane can originate
// EVPN Type-2 routes for it. Only local entries are reported (never
// FDB_F_REMOTE overlay entries or the BUM sentinel). Learns only — cradle
// has no FDB aging yet; entries persist for the datapath's lifetime. On
// (re)subscribe the full current set is replayed first.
message WatchFdbRequest {}

message FdbEvent {
  string mac = 1;
  uint32 bd  = 2;
}

message Neighbor4 {
  string oif = 1;       // interface name (used when oif_index == 0)
  string ip = 2;
  string mac = 3;
  uint32 oif_index = 4; // ifindex; preferred when non-zero
}

message Neighbor6 {
  string oif = 1;       // interface name (used when oif_index == 0)
  string ip = 2;
  string mac = 3;
  uint32 oif_index = 4; // ifindex; preferred when non-zero
}

// An incoming-label map (ILM) entry — mirrors zebra-rs's FibHandle
// ilm_add/ilm_replace/ilm_del. `action` is MPLS_OP_*: 0 = swap (the nexthop's
// labels are the out stack), 1 = pop-to-IP (PHP / L3VPN egress),
// 2 = pop one label.
message Ilm {
  uint32 in_label = 1;      // 20-bit incoming label (the LFIB key)
  uint32 nexthop_id = 2;    // resolved nexthop; its labels are the swap stack
  uint32 action = 3;        // MPLS_OP_SWAP | POP_L3 | POP
  uint32 vrf_table_id = 4;  // for POP_L3 into a VRF (0 = global)
}

message IlmDel {
  uint32 in_label = 1;
}

message Backend {
  string ip = 1;
  uint32 port = 2;
}

message Service {
  uint32 svc_id = 1;
  string vip = 2;
  uint32 port = 3;
  string proto = 4;  // tcp | udp
  repeated Backend backends = 5;
}

message StatsRequest {}

// One datapath counter: a packet count at a forwarding decision point.
message StatEntry {
  string name = 1;
  uint64 packets = 2;
}

message StatsReply {
  repeated StatEntry entries = 1;
}

// An L7 (HTTP) path-prefix route to a backend.
message L7Route {
  string path_prefix = 1;  // longest-prefix match on the request path
  string backend_ip = 2;
  uint32 backend_port = 3;
}

// An L7 service: TCP flows to vip:port are steered to the transparent proxy,
// which routes by HTTP path to one of `routes`.
message L7Service {
  string vip = 1;
  uint32 port = 2;
  repeated L7Route routes = 3;
}

service Cradle {
  rpc SetPort(Port) returns (Empty);
  rpc SetL2Domain(L2Domain) returns (Empty);
  rpc SetNexthop(Nexthop) returns (Empty);
  rpc SetNexthopGroup(NexthopGroup) returns (Empty);
  rpc AddRoute4(Route4) returns (Empty);
  rpc AddRoute4Batch(Route4Batch) returns (Empty);
  rpc DelRoute4(Route4Del) returns (Empty);
  rpc GetFibSummary(FibSummaryRequest) returns (FibSummary);
  rpc AddRoute6(Route6) returns (Empty);
  rpc DelRoute6(Route6Del) returns (Empty);
  rpc SetNeighbor4(Neighbor4) returns (Empty);
  rpc SetNeighbor6(Neighbor6) returns (Empty);
  rpc AddIlm(Ilm) returns (Empty);
  rpc DelIlm(IlmDel) returns (Empty);
  rpc AddLocalSid(LocalSid) returns (Empty);
  rpc DelLocalSid(LocalSidDel) returns (Empty);
  rpc SetSrv6EncapSource(Srv6EncapSource) returns (Empty);
  rpc AddFdbRemote(FdbRemote) returns (Empty);
  rpc DelFdbRemote(FdbRemoteDel) returns (Empty);
  rpc WatchFdb(WatchFdbRequest) returns (stream FdbEvent);
  rpc AddReplSlot(ReplSlot) returns (Empty);
  rpc DelReplSlot(ReplSlot) returns (Empty);
  rpc AddService(Service) returns (Empty);
  rpc GetStats(StatsRequest) returns (StatsReply);
  rpc AddL7Service(L7Service) returns (Empty);
}
