syntax = "proto3";

package vty;

// The Command execution.
service Exec {
  rpc DoExec(ExecRequest) returns (ExecReply) {}
  // Released by the vty bash EXIT trap. Drops the caller's session
  // from the server-side SessionTable so the slot is reclaimed
  // immediately on a clean shell exit (in parallel with the kernel
  // pidfd watcher that handles abnormal exits).
  rpc Logout(LogoutRequest) returns (LogoutReply) {}
  // Promote the caller's session to Admin after PAM authenticates
  // the supplied password. On success the session holds the Admin
  // role until either ttl_secs idle (refreshed on each authorized
  // RPC) or a 4 h hard cap elapses, whichever comes first.
  rpc Enable(EnableRequest) returns (EnableReply) {}
  // Drop the caller's session back to View. Idempotent.
  rpc Disable(DisableRequest) returns (DisableReply) {}
}

message LogoutRequest {}

message LogoutReply {
  bool ok = 1;
}

message EnableRequest {
  // Password verified by the 'zebra-rs' PAM service via the vtypam
  // helper.
  string password = 1;
  // Optional. When non-empty, PAM authenticates against this
  // account name instead of the caller's own (su-style). Used by
  // the vty `configure` auto-elevate flow which authenticates
  // against root regardless of who the caller is. Empty string
  // falls back to the session's resolved username.
  string auth_user = 2;
}

message EnableReply {
  bool ok = 1;
  // Human-readable detail (auth failure reason, lockout message).
  string message = 2;
  // Sliding idle TTL in seconds. Refreshed on each authorized RPC
  // up to a separate absolute hard cap.
  uint32 ttl_secs = 3;
}

message DisableRequest {}

message DisableReply {
  bool ok = 1;
}

// Command message type.
enum ExecType {
  EXEC = 0;
  COMPLETE = 1;
  COMPLETE_TRAILING_SPACE = 2;
  COMPLETE_FIRST_COMMANDS = 3;
  COMPLETE_DYNAMIC = 4;
}

// The request message containing user input string.
message ExecRequest {
  ExecType type = 1;
  string mode = 2;
  uint32 privilege = 3;
  string line = 4;
  repeated string args = 5;
  bool interactive = 6;
}

// Command exec code.
enum ExecCode {
  SUCCESS = 0;
  NOMATCH = 1;
  INCOMPLETE = 2;
  AMBIGUOUS = 3;
  SHOW = 4;
  REDIRECT = 5;
  REDIRECT_SHOW = 6;
}

// The response message containing the completion with help.
message ExecReply {
  ExecCode code = 1;
  string lines = 2;
  uint32 port = 3;
  repeated string candidates = 4;
  repeated CommandPath paths = 5;
  // Running-config `system hostname`, empty when unconfigured. Set on
  // ExecType.EXEC replies; the vty shell tracks it in CLI_HOSTNAME so
  // the prompt renders the configured name (falling back to the OS
  // hostname when empty).
  string hostname = 6;
}

// The Command register.
service Register {
  rpc DoRegister(RegisterRequest) returns (RegisterReply) {}
  rpc DoRegisterModule(RegisterModuleRequest) returns (RegisterModuleReply) {}
}

// The request message for command definition.
message RegisterRequest {
  string name = 1;
  string module = 2;
  string mode = 3;
  string line = 4;
  uint32 privilege = 5;
  repeated string helps = 6;
  ExecCode code = 7;
}

// The response message for callback ID.
message RegisterReply {
  int32 callbackid = 1;
}

// The request message mode information.
message RegisterModuleRequest {
  string module = 1;
  string port = 2;
}

// The response message containing the callbackID for the mode change.
message RegisterModuleReply {
  int32 result = 1;
}

// The module exec
service ExecModule {
  rpc DoExecModule(ExecModuleRequest) returns (ExecModuleReply) {}
}

// The request message mode information.
message ExecModuleRequest {
  int32 callbackid = 1;
  repeated string args = 2;
}

// The response message containing the callbackID for the mode change.
message ExecModuleReply {
  int32 result = 1;
  string line = 2;
}

// Configuration service
enum ConfigType {
  SET = 0;
  DEL = 1;
  VALIDATE_START = 2;
  VALIDATE_END = 3;
  VALIDATE_SUCCESS = 4;
  VALIDATE_FAILED = 5;
  COMMIT_START = 6;
  COMMIT_END = 7;
  SUBSCRIBE = 8;
  SUBSCRIBE_MULTI = 9;
  SUBSCRIBE_REQUEST = 10;
  JSON_CONFIG = 11;
  API_CALL_FINISHED = 12;
}

// Configuration
service Config {
  rpc DoConfig(stream ConfigRequest) returns (stream ConfigReply) {}
}

// Subscribe type.
enum SubscribeType {
  COMMAND = 0;
  JSON = 1;
}

message SubscribeRequest {
  SubscribeType type = 1;
  string path = 2;
}

message ConfigRequest {
  ConfigType type = 1;
  string module = 2;
  uint32 port = 3;
  SubscribeType subtype = 4;
  repeated string path = 5;
  repeated SubscribeRequest subscribe = 6;
}

message ConfigReply {
  int32 result = 1;
  ConfigType type = 2;
  repeated string path = 3;
  string json = 4;
}

// YANG match type.
enum YangMatch {
  Dir = 0;
  DirMatched = 1;
  Key = 2;
  KeyMatched = 3;
  Leaf= 4;
  LeafMatched = 5;
  LeafList = 6;
  LeafListMatched = 7;
}

message CommandPath {
  string name = 1;
  string key = 2;
  YangMatch ymatch = 3;
  repeated string mandatory = 4;
  int32 sort_priority = 5;
  // When non-empty, this list node forbids key-only entries: every list
  // entry must carry at least one child node. The string is the human-
  // readable requirement (e.g. "network or redistribute") surfaced in the
  // commit-time error. Driven by the `ext:non-empty` YANG extension.
  string non_empty = 6;
  // When this node belongs to a `case` of a YANG `choice`, the names of
  // the sibling nodes contributed by the choice's OTHER cases. Setting
  // this node implicitly deletes them from the candidate store
  // (RFC 7950 §7.9.3) — `config_set_dir` performs the purge.
  repeated string choice_exclude = 7;
}

// Show service.
message ShowRequest {
  string line = 1;
  bool json = 2;
  repeated CommandPath paths = 3;
}

message ShowReply {
  string str = 1;
}

service Show {
  rpc Show(ShowRequest) returns (stream ShowReply) {}
}

// Apply service.
message ApplyRequest {
  string line = 1;
}

enum ApplyCode {
  APPLIED = 0;
  FORMAT_ERROR = 1;
  PARSE_ERROR = 2;
  MISSING_MANDATORY = 3;
}

message ApplyReply {
  ApplyCode apply_code = 1;
  ExecCode exec_code = 2;
  string description = 3;
}

service Apply {
  rpc Apply(stream ApplyRequest) returns (ApplyReply) {}
}

// Clear service.
message ClearRequest {
  string line = 1;
  repeated CommandPath paths = 2;
}

message ClearReply {
  int32 result = 1;
  string str = 2;
}

service Clear {
  rpc Clear(ClearRequest) returns (ClearReply) {}
}
