# This is an example nfpm configuration file.
# Make sure to check the documentation at https://nfpm.goreleaser.com
#
# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://nfpm.goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

name: "zebra-rs"
arch: "arm64"
platform: "linux"
version: "26.7.5"
section: "default"
priority: "extra"
replaces:
  - zebra-rs
provides:
  - zebra-rs
# The eBPF data-plane engine `system ebpf enabled` spawns (/usr/bin/cradle).
# Optional: everything else works without it. The version floor is the cradle
# release this zebra-rs targets (the `proto/cradle.proto` contract), kept in
# sync with the top-level `cradle-version` file by version-update.sh; the
# release/publish-apt pipeline ingests exactly that cradle release so
# `apt install zebra-rs` pulls it.
recommends:
  - cradle-rs (>= 0.9.7)
maintainer: "Kunihiro Ishiguro <kunihiro@zebra.rs>"
description: |
  zebra-rs is reincarnation of GNU zebra in Rust.
homepage: "https://zebra.rs"
license: "AGPLv3"
changelog: "../CHANGELOG.yaml"
contents:
  - src: ../target/release/zebra-rs
    dst: /usr/bin/zebra-rs
  - src: ../vty/vty
    dst: /usr/bin/vty
  - src: ../target/release/vtyhelper
    dst: /usr/bin/vtyhelper
  - src: ../target/release/vtyctl
    dst: /usr/bin/vtyctl
  - src: ../target/release/vtypam
    dst: /usr/sbin/vtypam
    file_info:
      mode: 0755
  - src: ../etc/pam.d/zebra-rs.example
    dst: /etc/pam.d/zebra-rs.example
    file_info:
      mode: 0644
  - src: ../zebra-rs/yang
    dst: /etc/zebra-rs/yang
  # Example Lua policy scripts for the embedded scripting engine (on by
  # default). Operators drop their own scripts here and bind them from
  # `router bgp { lua-script <name> { source-path ... } }`.
  - src: ../etc/zebra-rs/lua
    dst: /etc/zebra-rs/lua
  # Playset lab topologies (netns-based example networks). Read-only data,
  # so they live under /usr/share rather than /etc. Staged into out/ by the
  # Makefile `playset` target to filter out runtime artifacts (*.log, *.pid).
  - src: ./out/playset
    dst: /usr/share/zebra-rs/playset
  - src: ./modules-load.d/zebra-rs.conf
    dst: /etc/modules-load.d/zebra-rs.conf
  - src: ./patch/usr/lib/systemd/system/zebra-rs.service
    dst: /usr/lib/systemd/system/zebra-rs.service
overrides:
  deb:
    scripts:
      postinstall: ./scripts/postinstall.sh
      preremove: ./scripts/prerm.sh
      postremove: ./scripts/postrm.sh
