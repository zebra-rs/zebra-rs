# zebra-rs configuration file.
#
# This is the daemon's default load/save target (/etc/zebra-rs/zebra-rs.conf,
# resolved next to the YANG tree). It is a dpkg conffile: your edits — and any
# running configuration the daemon persists here — are preserved across package
# upgrades, and the file is removed only on purge.
#
# It ships comment-only, which the config loader treats as an empty
# configuration. Add configuration in CLI brace, JSON, YAML, or set/delete
# format, or configure the running daemon and save.
