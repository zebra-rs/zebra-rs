prefix-set:
- name: out-test
  prefixes:
  - prefix: 10.0.0.1/32
policy-options:
  policy:
  - name: out-test
    entry:
    - number: 10
      match:
        prefix-set: out-test
routing:
  bgp:
    global:
      as: 65001
      identifier: 192.168.0.1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: ipv4-unicast
        enabled: true
      apply-policy:
        out: out-test
      enabled: true
      peer-as: 65001
    afi-safi:
    - name: ipv4-unicast
      network:
      - prefix: 10.0.0.1/32
      - prefix: 10.0.0.2/32
