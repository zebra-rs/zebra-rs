router:
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.1
    timer:
      adv-interval:
        ebgp: 1
    neighbor:
    - remote-address: 2001:db8::2
      afi-safi:
      - name: ipv6
        enabled: true
      enabled: true
      remote-as: 65002
    afi-safi:
    - name: ipv6
      network:
      - prefix: 2001:db8:a::2/128
