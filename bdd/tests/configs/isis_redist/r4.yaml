# r4 — interior router on the bottom path r1—r4—r5—r3.
interface:
- if-name: lo
  ipv4:
    address: 10.0.0.4/32
- if-name: i1
  ipv4:
    address: 10.0.14.2/30
- if-name: i5
  ipv4:
    address: 10.0.45.1/30
router:
  isis:
    net: 49.0001.0000.0000.0004.00
    is-type: level-1
    hostname: r4
    interface:
    - if-name: lo
      circuit-type: level-1
      ipv4:
        enable: true
    - if-name: i1
      circuit-type: level-1
      network-type: point-to-point
      metric: 10
      ipv4:
        enable: true
    - if-name: i5
      circuit-type: level-1
      network-type: point-to-point
      metric: 10
      ipv4:
        enable: true
