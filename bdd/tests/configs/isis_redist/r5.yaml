# r5 — interior router on the bottom path r1—r4—r5—r3.
interface:
- if-name: lo
  ipv4:
    address: 10.0.0.5/32
- if-name: i4
  ipv4:
    address: 10.0.45.2/30
- if-name: i3
  ipv4:
    address: 10.0.35.1/30
router:
  isis:
    net: 49.0001.0000.0000.0005.00
    is-type: level-1
    hostname: r5
    interface:
    - if-name: lo
      circuit-type: level-1
      ipv4:
        enable: true
    - if-name: i4
      circuit-type: level-1
      network-type: point-to-point
      metric: 10
      ipv4:
        enable: true
    - if-name: i3
      circuit-type: level-1
      network-type: point-to-point
      metric: 10
      ipv4:
        enable: true
