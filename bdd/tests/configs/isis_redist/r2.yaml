# r2 — interior router on the top path r1—r2—r3.
interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: i1
  ipv4:
    address: 10.0.12.2/30
- if-name: i3
  ipv4:
    address: 10.0.23.1/30
router:
  isis:
    net: 49.0001.0000.0000.0002.00
    is-type: level-1
    hostname: r2
    interface:
    - if-name: lo
      circuit-type: level-1
      ipv4:
        enabled: true
    - if-name: i1
      circuit-type: level-1
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
    - if-name: i3
      circuit-type: level-1
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
