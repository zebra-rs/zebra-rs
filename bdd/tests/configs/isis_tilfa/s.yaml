interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
- if-name: s-n1
  ipv4:
    address: 192.168.0.1/30
- if-name: s-n2
  ipv4:
    address: 192.168.0.5/30
- if-name: s-n3
  ipv4:
    address: 192.168.0.9/30
router:
  isis:
    net: 49.0000.0000.0000.0001.00
    hostname: s
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 100
    - if-name: s-n1
      ipv4:
        enabled: true
      metric: 1
    - if-name: s-n2
      ipv4:
        enabled: true
      metric: 1
    - if-name: s-n3
      ipv4:
        enabled: true
      metric: 1000
    is-type: level-2-only
    segment-routing: mpls
    fast-reroute: ti-lfa
    te-router-id: 10.0.0.1
