interface:
- if-name: lo
  ipv4:
    address: 10.0.0.6/32
- if-name: r2-n1
  ipv4:
    address: 192.168.0.25/30
- if-name: r2-r1
  ipv4:
    address: 192.168.0.29/30
- if-name: r2-r3
  ipv4:
    address: 192.168.0.33/30
router:
  isis:
    net: 49.0000.0000.0000.0006.00
    hostname: r2
    interface:
    - if-name: lo
      ipv4:
        enable: true
        prefix-sid:
          index: 600
    - if-name: r2-n1
      ipv4:
        enable: true
      metric: 1
    - if-name: r2-r1
      ipv4:
        enable: true
      metric: 1000
    - if-name: r2-r3
      ipv4:
        enable: true
      metric: 1000
    is-type: level-2-only
    segment-routing: mpls
    fast-reroute: ti-lfa
    te-router-id: 10.0.0.6
