interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: n1-s
  ipv4:
    address: 192.168.0.2/30
- if-name: n1-r1
  ipv4:
    address: 192.168.0.13/30
- if-name: n1-r2
  ipv4:
    address: 192.168.0.26/30
- if-name: n1-d
  ipv4:
    address: 192.168.0.38/30
router:
  isis:
    net: 49.0000.0000.0000.0002.00
    hostname: n1
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 10.0.0.2
    interface:
    - if-name: lo
      ipv4:
        enable: true
        prefix-sid:
          index: 200
    - if-name: n1-s
      ipv4:
        enable: true
      metric: 1
    - if-name: n1-r1
      ipv4:
        enable: true
      metric: 1
    - if-name: n1-r2
      ipv4:
        enable: true
      metric: 1
    - if-name: n1-d
      ipv4:
        enable: true
      metric: 1
