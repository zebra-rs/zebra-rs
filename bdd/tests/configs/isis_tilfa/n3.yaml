interface:
- if-name: lo
  ipv4:
    address: 10.0.0.4/32
- if-name: n3-s
  ipv4:
    address: 192.168.0.10/30
- if-name: n3-r1
  ipv4:
    address: 192.168.0.21/30
router:
  isis:
    net: 49.0000.0000.0000.0004.00
    hostname: n3
    interface:
    - if-name: lo
      ipv4:
        enable: true
        prefix-sid:
          index: 400
    - if-name: n3-s
      ipv4:
        enable: true
      metric: 1000
    - if-name: n3-r1
      ipv4:
        enable: true
      metric: 1000
    is-type: level-2-only
    segment-routing: mpls
    fast-reroute: ti-lfa
    te-router-id: 10.0.0.4
