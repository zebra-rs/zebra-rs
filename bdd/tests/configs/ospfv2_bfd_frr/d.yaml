interface:
- if-name: lo
  ipv4:
    address: 10.0.0.8/32
- if-name: d-n1
  ipv4:
    address: 192.168.0.37/30
- if-name: d-r3
  ipv4:
    address: 192.168.0.41/30
router:
  ospf:
    router-id: 10.0.0.8
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 800
      - if-name: d-n1
        enable: true
        network-type: point-to-point
        cost: 1
      - if-name: d-r3
        enable: true
        network-type: point-to-point
        cost: 1
