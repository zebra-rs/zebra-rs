interface:
- if-name: lo
  ipv4:
    address: 10.0.0.4/32
- if-name: n3-s
  ipv4:
    address: 192.168.0.10/30
- if-name: n3-r1
  ipv4:
    address: 192.168.0.21/30
router:
  ospf:
    router-id: 10.0.0.4
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 400
      - if-name: n3-s
        enable: true
        network-type: point-to-point
        cost: 1000
      - if-name: n3-r1
        enable: true
        network-type: point-to-point
        cost: 1000
