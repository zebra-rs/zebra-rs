interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: n1-s
  ipv4:
    address: 192.168.0.2/30
- if-name: n1-r1
  ipv4:
    address: 192.168.0.13/30
- if-name: n1-r2
  ipv4:
    address: 192.168.0.26/30
- if-name: n1-d
  ipv4:
    address: 192.168.0.38/30
router:
  ospf:
    router-id: 10.0.0.2
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
        prefix-sid:
          index: 200
      - if-name: n1-s
        enabled: true
        network-type: point-to-point
        cost: 1
        bfd:
          enabled: true
      - if-name: n1-r1
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: n1-r2
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: n1-d
        enabled: true
        network-type: point-to-point
        cost: 1
