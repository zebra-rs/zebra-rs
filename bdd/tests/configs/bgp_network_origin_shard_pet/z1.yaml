router:
  bgp:
    tracing:
      sharding: null
    global:
      as: 65501
      router-id: 10.0.0.1
    sharding:
      rib-sharding: 4
      peer-sharding: true
    timer:
      adv-interval:
        ebgp: 1
    neighbor:
    - remote-address: 2001:db8::8
      afi-safi:
      - name: ipv6
        enabled: true
      enabled: true
      remote-as: 65501
      update-source: 2001:db8::1
    afi-safi:
    - name: ipv4
      network:
      - prefix: 0.0.0.0/0
      - prefix: 5.5.5.0/24
