# PE2 — provider edge 2 (AS 65000). Mirror of PE1: SRv6 locator LOC2,
# iBGP VPNv6 to PE1, vrf-cust (encapsulation srv6) IPv6 eBGP PE-CE to
# CE2, export with RD 65000:2 + RT 65000:100.
vrf:
- name: vrf-cust
  ipv6:
    route-target:
      import:
      - 65000:100
      export:
      - 65000:100
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::3/128
- if-name: p
  ipv6:
    address: 2001:db8:cafe:2::2/64
- if-name: ce2
  vrf: vrf-cust
  ipv6:
    address: 2001:db8:2e::2/64
segment-routing:
  locator:
  - name: LOC2
    prefix: fcbb:bbbb:2::/48
    behavior: usid
router:
  isis:
    net: 49.0000.0000.0000.0003.00
    hostname: pe2
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: LOC2
    interface:
    - if-name: lo
      ipv6:
        enable: true
    - if-name: p
      network-type: point-to-point
      metric: 10
      ipv6:
        enable: true
  bgp:
    global:
      as: 65000
      router-id: 1.1.1.3
    segment-routing:
      srv6:
        locator: LOC2
    neighbor:
    - remote-address: 2001:db8::1
      remote-as: 65000
      update-source: 2001:db8::3
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: vpnv6
        enabled: true
    vrf:
    - name: vrf-cust
      rd: 65000:2
      encapsulation: srv6
      neighbor:
      - remote-address: 2001:db8:2e::1
        remote-as: 65002
        afi-safi:
        - name: ipv6
          enabled: true
