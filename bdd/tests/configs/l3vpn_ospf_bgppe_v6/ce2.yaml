# CE2 — customer edge 2 (AS 65002). Mirror of CE1: OSPFv3 toward C2,
# IPv6 eBGP toward PE2, mutual redistribution.
interface:
- if-name: c2
  ipv6:
    address: 2001:db8:2c::2/64
- if-name: pe2
  ipv6:
    address: 2001:db8:2e::1/64
router:
  ospfv3:
    router-id: 10.2.0.5
    redistribute:
      bgp:
        metric: 20
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: c2
        enabled: true
        network-type: point-to-point
  bgp:
    global:
      as: 65002
      router-id: 10.2.0.5
    neighbor:
    - remote-address: 2001:db8:2e::2
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv6
        enabled: true
    afi-safi:
    - name: ipv6
      redistribute:
        ospf: {}
        connected: {}
