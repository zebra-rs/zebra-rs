# ASBR: a static route (nexthop resolves via the connected /30) plus
# instance-level `redistribute static` — every static route in the RIB
# becomes a Type-5 AS-External LSA with metric 20 / E2 defaults.
interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: etha
  ipv4:
    address: 10.0.12.2/30
router:
  static:
    ipv4:
      route:
      - prefix: 192.168.50.0/24
        nexthop:
        - address: 10.0.12.1
  ospf:
    router-id: 10.0.0.2
    redistribute:
      static:
        metric: 20
        metric-type: type-2
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
      - if-name: etha
        enable: true
        network-type: point-to-point
