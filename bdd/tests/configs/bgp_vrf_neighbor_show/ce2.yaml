# CE2 (AS 65002) — GTSM peer so the ttl-security session establishes.
interface:
- {if-name: lo, ipv4: {address: 10.0.2.1/32}}
- {if-name: pe1, ipv4: {address: 10.2.0.2/30}}
router:
  bgp:
    global: {as: 65002, router-id: 10.0.2.1}
    timer: {adv-interval: {ebgp: 3}}
    neighbor:
    - remote-address: 10.2.0.1
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      ttl-security: {}
      afi-safi:
      - name: ipv4
        enabled: true
