interface:
- if-name: i1
  ipv4:
    address: 192.168.0.1/24
router:
  bgp:
    global:
      as: 65001
      identifier: 192.168.0.1
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 100
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.0.0.1/32
