interface:
- if-name: i1
  ipv4:
    address: 192.168.0.2/24
- if-name: i2
  ipv4:
    address: 192.168.1.2/24
router:
  bgp:
    global:
      as: 100
      identifier: 192.168.0.2
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 1
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 65001
    - remote-address: 192.168.1.3
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 200
