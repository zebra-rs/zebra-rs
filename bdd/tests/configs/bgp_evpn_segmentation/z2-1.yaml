# z2 — the Regional Border Router (RFC 9572 Section 6). It borders two
# regions, each modelled as a neighbor-group carrying a region-id:
#   region-a (region-id 65001) faces z1, region-b (region-id 65002) faces z3.
# z2 has no local VXLAN: it aggregates region A's per-PE IMET into a single
# Per-Region I-PMSI (Type-9) re-originated toward region B with next-hop-self,
# and does not propagate the per-PE IMET across the boundary.
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.2
    neighbor-group:
    - name: region-a
      remote-as: 65001
      region-id: 65001
    - name: region-b
      remote-as: 65001
      region-id: 65002
    neighbor:
    - remote-address: 192.168.0.1
      enabled: true
      neighbor-group: region-a
      afi-safi:
      - name: ipv4
        enabled: true
      - name: evpn
        enabled: true
    - remote-address: 192.168.0.3
      enabled: true
      neighbor-group: region-b
      afi-safi:
      - name: ipv4
        enabled: true
      - name: evpn
        enabled: true
