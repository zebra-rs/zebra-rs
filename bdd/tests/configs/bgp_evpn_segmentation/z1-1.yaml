# z1 — a PE in region A. Plain EVPN speaker with a local VXLAN (VNI 10),
# so it originates a Type-3 IMET (auto-RT 65001:10). Peers only with the
# Regional Border Router z2.
vxlan:
- name: vxlan10
  vni: 10
  local-address: 192.168.0.1
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.1
    afi-safi:
    - name: evpn
      advertise-all-vni: true
    neighbor:
    - remote-address: 192.168.0.2
      enabled: true
      remote-as: 65001
      afi-safi:
      - name: ipv4
        enabled: true
      - name: evpn
        enabled: true
