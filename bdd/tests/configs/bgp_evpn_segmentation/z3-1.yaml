# z3 — a PE in region B. It peers only with the RBR z2 and receives region
# A's aggregated Per-Region I-PMSI (Type-9) route, with z2 as the next hop;
# it does NOT receive region A's per-PE IMET (held at the boundary).
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.3
    neighbor:
    - remote-address: 192.168.0.2
      enabled: true
      remote-as: 65001
      afi-safi:
      - name: ipv4
        enabled: true
      - name: evpn
        enabled: true
