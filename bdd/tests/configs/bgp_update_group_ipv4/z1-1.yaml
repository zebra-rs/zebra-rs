router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: ipv4
        enabled: true
        policy:
          out: out-shared
      enabled: true
      remote-as: 65002
    - remote-address: 192.168.0.3
      afi-safi:
      - name: ipv4
        enabled: true
        policy:
          out: out-shared
      enabled: true
      remote-as: 65003
    - remote-address: 192.168.0.4
      afi-safi:
      - name: ipv4
        enabled: true
        policy:
          out: out-different
      enabled: true
      remote-as: 65004
policy:
- name: out-shared
  entry:
  - number: 10
    action: permit
- name: out-different
  entry:
  - number: 10
    action: permit
