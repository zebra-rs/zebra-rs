router:
  bgp:
    global:
      as: 65001
      identifier: 192.168.0.1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      peer-as: 65002
      policy:
        out: out-shared
    - remote-address: 192.168.0.3
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      peer-as: 65003
      policy:
        out: out-shared
    - remote-address: 192.168.0.4
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      peer-as: 65004
      policy:
        out: out-different
policy:
- name: out-shared
  entry:
  - number: 10
    action: permit
- name: out-different
  entry:
  - number: 10
    action: permit
