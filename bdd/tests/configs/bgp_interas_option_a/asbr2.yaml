# ASBR2 (AS 65001 border — a PE in Option A). Mirror of ASBR1.
#  - VPNv4 iBGP to PE2 over the IS-IS/SR core.
#  - vrf-cust holds the inter-AS link to ASBR1 (172.16.0.0/30) and runs a
#    PE-CE eBGP session inside the VRF to ASBR1 (remote-as 65000).
vrf:
- name: vrf-cust
  ipv4:
    route-target:
      import:
      - 65000:100
      export:
      - 65000:100
interface:
- if-name: lo
  ipv4:
    address: 2.2.2.3/32
- if-name: asbr1
  vrf: vrf-cust
  ipv4:
    address: 172.16.0.2/30
- if-name: p2
  ipv4:
    address: 10.0.1.1/30
router:
  isis:
    net: 49.0000.0000.0000.0006.00
    hostname: asbr2
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 2.2.2.3
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 6
    - if-name: p2
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
  bgp:
    global:
      as: 65001
      router-id: 2.2.2.3
    neighbor:
    - remote-address: 2.2.2.1
      remote-as: 65001
      update-source: 2.2.2.3
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
    vrf:
    - name: vrf-cust
      rd: 65001:2
      neighbor:
      - remote-address: 172.16.0.1
        remote-as: 65000
        enabled: true
