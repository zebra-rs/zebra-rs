interface:
- if-name: lo
  ipv4:
    address: 10.0.0.5/32
- if-name: r1-n1
  ipv4:
    address: 192.168.6.2/24
- if-name: r1-n2
  ipv4:
    address: 192.168.7.2/24
- if-name: r1-n3
  ipv4:
    address: 192.168.10.2/24
- if-name: r1-r2
  ipv4:
    address: 192.168.4.1/24
system:
  hostname: r1
router:
  isis:
    net: 49.0000.0000.0000.0005.00
    hostname: r1
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 500
    - if-name: r1-n1
      ipv4:
        enabled: true
      metric: 1
    - if-name: r1-n2
      ipv4:
        enabled: true
      metric: 1
    - if-name: r1-n3
      ipv4:
        enabled: true
      metric: 1000
    - if-name: r1-r2
      ipv4:
        enabled: true
      metric: 1000
    is-type: level-2-only
    segment-routing:
      mpls: {}
    te-router-id: 10.0.0.5
