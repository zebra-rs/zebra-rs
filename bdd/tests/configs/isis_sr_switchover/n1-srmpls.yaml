interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: n1-s
  ipv4:
    address: 192.168.0.2/24
- if-name: n1-r1
  ipv4:
    address: 192.168.6.1/24
- if-name: n1-r2
  ipv4:
    address: 192.168.8.1/24
- if-name: n1-d
  ipv4:
    address: 192.168.2.1/24
system:
  hostname: n1
router:
  isis:
    net: 49.0000.0000.0000.0002.00
    hostname: n1
    is-type: level-2-only
    segment-routing:
      mpls: {}
    te-router-id: 10.0.0.2
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 200
    - if-name: n1-s
      ipv4:
        enabled: true
      metric: 1
    - if-name: n1-r1
      ipv4:
        enabled: true
      metric: 1
    - if-name: n1-r2
      ipv4:
        enabled: true
      metric: 1
    - if-name: n1-d
      ipv4:
        enabled: true
      metric: 1
