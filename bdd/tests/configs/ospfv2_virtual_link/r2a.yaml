interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: etha
  ipv4:
    address: 10.0.12.2/30
- if-name: ethc
  ipv4:
    address: 10.0.23.1/30
router:
  ospf:
    router-id: 10.0.0.2
    area:
    - area-id: 0.0.0.1
      virtual-link:
      - router-id: 10.0.0.1
        authentication: message-digest
        message-digest-key:
        - key-id: 1
          md5: VLSECRET
      interface:
      - if-name: lo
        enabled: true
      - if-name: etha
        enabled: true
        network-type: point-to-point
    - area-id: 0.0.0.2
      interface:
      - if-name: ethc
        enabled: true
        network-type: point-to-point
