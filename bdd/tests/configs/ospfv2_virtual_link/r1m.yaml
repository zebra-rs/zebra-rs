interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
- if-name: ethm
  ipv4:
    address: 10.0.12.1/30
router:
  ospf:
    router-id: 10.0.0.1
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
    - area-id: 0.0.0.1
      # Multi-hop virtual link: r2 is two hops away through rm.
      virtual-link:
      - router-id: 10.0.0.2
      interface:
      - if-name: ethm
        enabled: true
        network-type: point-to-point
