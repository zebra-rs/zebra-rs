interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
- if-name: ethb
  ipv4:
    address: 10.0.12.1/30
router:
  ospf:
    router-id: 10.0.0.1
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
    - area-id: 0.0.0.1
      # RFC 2328 §15: virtual link to r2 through transit area 1.
      virtual-link:
      - router-id: 10.0.0.2
      interface:
      - if-name: ethb
        enabled: true
        network-type: point-to-point
