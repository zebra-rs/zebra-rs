interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
- if-name: ethb
  ipv4:
    address: 10.0.12.1/30
router:
  ospf:
    router-id: 10.0.0.1
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
    - area-id: 0.0.0.1
      # RFC 2328 §15: the virtual link carries its OWN authentication,
      # independent of the (unauthenticated) transit-area interfaces.
      virtual-link:
      - router-id: 10.0.0.2
        authentication: message-digest
        message-digest-key:
        - key-id: 1
          md5: VLSECRET
      interface:
      - if-name: ethb
        enable: true
        network-type: point-to-point
