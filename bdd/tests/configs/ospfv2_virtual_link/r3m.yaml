interface:
- if-name: lo
  ipv4:
    address: 10.0.0.3/32
- if-name: ethb
  ipv4:
    address: 10.0.23.2/30
router:
  ospf:
    router-id: 10.0.0.3
    area:
    - area-id: 0.0.0.2
      interface:
      - if-name: lo
        enabled: true
      - if-name: ethb
        enabled: true
        network-type: point-to-point
