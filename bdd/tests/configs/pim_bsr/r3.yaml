interface:
- if-name: eth5
  ipv4:
    address: 10.9.23.2/24
- if-name: eth6
  ipv4:
    address: 10.9.24.1/24
router:
  static:
    ipv4:
      route:
      - prefix: 10.9.22.0/24
        nexthop:
        - address: 10.9.23.1
      - prefix: 10.9.21.0/24
        nexthop:
        - address: 10.9.23.1
  pim:
    interface:
    - if-name: eth5
      dr-priority: 1
    - if-name: eth6
      igmp:
        enabled: true
