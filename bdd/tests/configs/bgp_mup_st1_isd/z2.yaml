# z2 — MUP interwork / UPF node. Its MUP-C originates a Type-1 ST (ST1)
# route from a PFCP session on NI `access` (`afi-safi mup route st1`), and
# VRF N6 (rd 65501:20, `encapsulation srv6`, import RT 65501:10) imports
# z1's ISD (Interwork Segment Discovery, prefix 10.0.0.0/24 + End.DT46 SID
# from z1's locator S). Because the ST1's gNB endpoint (10.0.0.1) is covered
# by the ISD prefix (the gNB N3 network), z2 resolves the ST1 to z1's
# *remote* segment and installs an SRv6 H.Encaps route for the ST1's UE
# prefix into the VRF table (endpoint = lookup key, UE prefix = forwarded
# destination), resolved through the IS-IS SRv6 underlay toward z1:
#   10.60.1.5/32 via <z1 underlay> encap seg6 segs [z1 End.DT46 SID]
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::2/128
- if-name: z2-z1
  ipv6:
    address: 2001:db8:0:12::2/64
segment-routing:
  locator:
  - name: LOC2
    prefix: fcbb:bbbb:2::/48
    behavior: usid
vrf:
- name: N6
  mup:
    route-target:
      import:
      - "65501:10"
router:
  isis:
    net: 49.0000.0000.0000.0002.00
    hostname: z2
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: LOC2
    interface:
    - if-name: lo
      ipv6:
        enable: true
    - if-name: z2-z1
      network-type: point-to-point
      metric: 1
      ipv6:
        enable: true
  bgp:
    global:
      as: 65501
      router-id: 10.0.0.2
    timer:
      adv-interval:
        ibgp: 1
    segment-routing:
      srv6:
        locator: LOC2
    neighbor:
    - remote-address: 2001:db8::1
      remote-as: 65501
      update-source: 2001:db8::2
      enabled: true
      afi-safi:
      - name: mup
        enabled: true
    vrf:
    - name: N6
      rd: "65501:20"
      encapsulation: srv6
      afi-safi:
        mup:
          route:
          - type: st1
            network-instance: access
    mup-c:
      enable: true
      controller-address: 2001:db8::2
      pfcp:
        listen-address: 127.0.0.1
      srv6:
        locator: LOC2
