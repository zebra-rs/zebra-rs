vrf:
- name: vrf-blue
  ipv4:
    route-target:
      import:
      - 65001:100
      export:
      - 65001:100
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: vpnv4
        enabled: true
      enabled: true
      remote-as: 65001
