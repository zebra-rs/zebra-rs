vrf:
- name: vrf-blue
  ipv4:
    route-target:
      import:
      - 65001:100
      export:
      - 65001:100
router:
  bgp:
    global:
      as: 65001
      identifier: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: vpnv4
        enabled: true
      enabled: true
      remote-as: 65001
    vrf:
    - name: vrf-blue
      rd: 65001:200
