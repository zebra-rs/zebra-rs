# Classic-SID sibling of configs/srv6_tilfa_v3: the locator omits
# `behavior: usid`, so SIDs use the RFC 8986 full-SID layout.
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::2/128
- if-name: n1-s
  ipv6:
    address: 2001:db8:1::2/64
- if-name: n1-r1
  ipv6:
    address: 2001:db8:4::1/64
- if-name: n1-r2
  ipv6:
    address: 2001:db8:7::1/64
- if-name: n1-d
  ipv6:
    address: 2001:db8:10::1/64
segment-routing:
  locator:
  - name: LOC2
    prefix: fcbb:bbbb:2::/48
router:
  ospfv3:
    router-id: 10.0.0.2
    segment-routing:
      srv6:
        locator: LOC2
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
      - if-name: n1-s
        enable: true
        network-type: point-to-point
        cost: 1
      - if-name: n1-r1
        enable: true
        network-type: point-to-point
        cost: 1
      - if-name: n1-r2
        enable: true
        network-type: point-to-point
        cost: 1
      - if-name: n1-d
        enable: true
        network-type: point-to-point
        cost: 1
