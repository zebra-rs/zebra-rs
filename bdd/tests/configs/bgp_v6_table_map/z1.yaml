interface:
- if-name: z1-z2
  ipv4:
    address: 192.168.0.1/30
  ipv6:
    address: 2001:db8:12::1/64
router:
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.1
    neighbor:
    - remote-address: 192.168.0.2
      remote-as: 65002
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
      - name: ipv6
        enabled: true
    afi-safi:
    - name: ipv4
      network:
      - prefix: 1.1.1.1/32
    - name: ipv6
      network:
      - prefix: 2001:db8:100::/48
      - prefix: 2001:db8:200::/48
      - prefix: 2001:db8:300::/48
