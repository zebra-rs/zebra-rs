interface:
- if-name: i1
  ipv4:
    address: 192.168.0.2/24
- if-name: i2
  ipv4:
    address: 192.168.1.2/24
router:
  bgp:
    # Listen for inbound BGP on TCP 1790 instead of the default 179.
    port: 1790
    global:
      as: 65002
      router-id: 192.168.0.2
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 1
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 65001
      # Passive: never dial z1, so the z1-z2 session is always the one
      # z1 actively opened toward port 1790 — making the Foreign/Local
      # port assertions deterministic.
      transport:
        passive-mode: true
    - remote-address: 192.168.1.3
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 65003
