# Per-AFI ipv4 inbound policy that permits everything, layered on top of
# the peer-wide DENY-ALL inherited from the neighbor-group. The per-AFI
# binding wins for ipv4 (Peer::policy_list_at priority), so the routes the
# peer-wide policy denied are accepted again.
policy:
- name: DENY-ALL
  entry:
  - number: 10
    action: deny
- name: PERMIT-ALL
  entry:
  - number: 10
    action: permit
router:
  bgp:
    global:
      as: 65002
      router-id: 192.168.0.2
    neighbor-group:
    - name: PEER-WIDE
      policy:
        in: DENY-ALL
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
        policy:
          in: PERMIT-ALL
      soft-reconfiguration:
        inbound: true
      neighbor-group: PEER-WIDE
      enabled: true
      remote-as: 65001
