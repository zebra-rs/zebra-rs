# CE1 — customer edge 1 (AS 65001). IS-IS toward C1, eBGP toward PE1,
# with mutual redistribution: redistribute isis -> BGP (up), redistribute
# bgp -> IS-IS (down).
interface:
- if-name: c1
  ipv4:
    address: 10.1.0.2/30
- if-name: pe1
  ipv4:
    address: 10.1.0.5/30
router:
  isis:
    net: 49.0001.0000.0000.0012.00
    hostname: ce1
    is-type: level-2-only
    afi-safi:
    - name: ipv4
      redistribute:
        bgp: {}
    interface:
    - if-name: c1
      circuit-type: level-2-only
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
  bgp:
    global:
      as: 65001
      router-id: 10.1.0.5
    neighbor:
    - remote-address: 10.1.0.6
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
    afi-safi:
    - name: ipv4
      redistribute:
        isis: {}
        connected: {}
