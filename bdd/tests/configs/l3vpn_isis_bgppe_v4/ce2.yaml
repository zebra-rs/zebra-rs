# CE2 — customer edge 2 (AS 65002). Mirror of CE1: IS-IS toward C2, eBGP
# toward PE2, mutual redistribution.
interface:
- if-name: c2
  ipv4:
    address: 10.2.0.2/30
- if-name: pe2
  ipv4:
    address: 10.2.0.5/30
router:
  isis:
    net: 49.0001.0000.0000.0022.00
    hostname: ce2
    is-type: level-2-only
    afi-safi:
    - name: ipv4
      redistribute:
        bgp: {}
    interface:
    - if-name: c2
      circuit-type: level-2-only
      network-type: point-to-point
      metric: 10
      ipv4:
        enable: true
  bgp:
    global:
      as: 65002
      router-id: 10.2.0.5
    neighbor:
    - remote-address: 10.2.0.6
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
    afi-safi:
    - name: ipv4
      redistribute:
        isis: {}
        connected: {}
