interface:
- if-name: lo
  ipv6:
    address: 2001:db8::3/128
- if-name: ethb
  ipv6:
    address: 2001:db8:23::3/64
- if-name: ethd
  ipv6:
    address: 2001:db8:34::3/64
- if-name: ethf
  ipv6:
    address: 2001:db8:36::3/64
router:
  ospfv3:
    router-id: 10.0.0.3
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: ethb
        enabled: true
        network-type: point-to-point
      - if-name: ethd
        enabled: true
        network-type: point-to-point
        cost: 20
    - area-id: 0.0.0.2
      interface:
      - if-name: ethf
        enabled: true
        network-type: point-to-point
