interface:
- if-name: lo
  ipv6:
    address: 2001:db8::4/128
- if-name: etha
  ipv6:
    address: 2001:db8:14::4/64
- if-name: ethb
  ipv6:
    address: 2001:db8:24::4/64
- if-name: ethc
  ipv6:
    address: 2001:db8:34::4/64
router:
  ospfv3:
    router-id: 10.0.0.4
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
      - if-name: etha
        enable: true
        network-type: point-to-point
        cost: 20
      - if-name: ethb
        enable: true
        network-type: point-to-point
      - if-name: ethc
        enable: true
        network-type: point-to-point
        cost: 20
