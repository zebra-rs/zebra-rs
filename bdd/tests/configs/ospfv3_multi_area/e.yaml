interface:
- if-name: lo
  ipv6:
    address: 2001:db8::5/128
- if-name: etha
  ipv6:
    address: 2001:db8:15::5/64
router:
  ospfv3:
    router-id: 10.0.0.5
    area:
    - area-id: 0.0.0.1
      interface:
      - if-name: lo
        enable: true
      - if-name: etha
        enable: true
        network-type: point-to-point
