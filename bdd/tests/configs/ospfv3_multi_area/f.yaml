interface:
- if-name: lo
  ipv6:
    address: 2001:db8::6/128
- if-name: ethc
  ipv6:
    address: 2001:db8:36::6/64
router:
  ospfv3:
    router-id: 10.0.0.6
    area:
    - area-id: 0.0.0.2
      interface:
      - if-name: lo
        enable: true
      - if-name: ethc
        enable: true
        network-type: point-to-point
