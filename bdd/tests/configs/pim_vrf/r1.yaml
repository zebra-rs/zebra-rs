vrf:
- name: mvrf
interface:
- if-name: eth1
  vrf: mvrf
  ipv4:
    address: 10.8.13.1/24
- if-name: eth3
  vrf: mvrf
  ipv4:
    address: 10.8.14.1/24
router:
  pim:
    vrf:
    - name: mvrf
      interface:
      - if-name: eth1
        dr-priority: 1
      - if-name: eth3
        dr-priority: 1
