interface:
- if-name: eth1
  ipv4:
    address: 10.6.1.3/24
- if-name: eth2
  ipv4:
    address: 10.6.2.3/24
router:
  static:
    ipv4:
      route:
      - prefix: 10.6.0.0/24
        nexthop:
        - address: 10.6.1.1
  pim:
    interface:
    - if-name: eth1
      dr-priority: 1
    - if-name: eth2
      igmp:
        enabled: true
