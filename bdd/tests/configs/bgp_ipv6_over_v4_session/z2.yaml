interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
  ipv6:
    address: 2001:db8::2/128
- if-name: z2-z1
  ipv4:
    address: 192.168.0.2/30
  ipv6:
    address: 2001:db8:12::2/64
router:
  bgp:
    global:
      as: 65002
      router-id: 10.0.0.2
    neighbor:
    - remote-address: 192.168.0.1
      # 3s connect retry: a colliding initial connect under host load
      # otherwise backs off the default 120s, past the assert budget.
      timers: {connect-retry-time: 3}
      remote-as: 65001
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
      - name: ipv6
        enabled: true
    afi-safi:
    - name: ipv4
      redistribute:
        connected: {}
    - name: ipv6
      redistribute:
        connected: {}
