# z2 — eBGP peer (AS 65002). Sets `encapsulation-type srv6` on the IPv6
# unicast family toward z1, so it only accepts routes carrying an SRv6
# service SID. The redistributed connected prefix from z1 arrives with the
# End.DT6 SID and is installed in the BGP table as a "Remote SID".
interface:
- if-name: i1
  ipv6:
    address: 2001:db8:12::2/64
router:
  # Reach z1's SRv6 locator so the received route's next-hop (the locator
  # address) resolves via NHT — the ingress then installs the H.Encaps
  # entry toward the SID. In a real fabric the locator is carried by the
  # IGP; a static stand-in keeps this 2-node BGP test self-contained.
  static:
    ipv6:
      route:
      - prefix: fcbb:bbbb:1::/48
        nexthop:
        - address: 2001:db8:12::1
  bgp:
    global:
      as: 65002
      router-id: 10.0.0.2
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 1
    neighbor:
    - remote-address: 2001:db8:12::1
      remote-as: 65001
      enabled: true
      afi-safi:
      - name: ipv6
        enabled: true
        encapsulation-type: srv6
