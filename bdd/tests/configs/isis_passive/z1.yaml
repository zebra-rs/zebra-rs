interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
  ipv6:
    address: 2001:db8::1/128
- if-name: i2
  ipv4:
    address: 10.0.12.1/30
  ipv6:
    address: 2001:db8:12::1/64
- if-name: i3
  ipv4:
    address: 10.0.13.1/30
router:
  isis:
    net: 49.0000.0000.0000.0001.00
    is-type: level-2-only
    hostname: z1
    interface:
    - if-name: lo
      circuit-type: level-2-only
      ipv4:
        enabled: true
      ipv6:
        enabled: true
    - if-name: i2
      circuit-type: level-2-only
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
      ipv6:
        enabled: true
    - if-name: i3
      circuit-type: level-2-only
      passive: true
      metric: 10
      ipv4:
        enabled: true
