interface:
- if-name: eth1
  ipv4:
    address: 10.1.21.1/24
- if-name: eth2
  ipv4:
    address: 10.1.22.1/24
router:
  pim:
    rp:
      static:
      - address: 10.1.22.2
    interface:
    - if-name: eth1
      enabled: true
      dr-priority: 1
    - if-name: eth2
      enabled: true
      dr-priority: 1
