interface:
- if-name: i1
  ipv4:
    address: 192.168.0.3/24
router:
  bgp:
    global:
      as: 65003
      router-id: 192.168.0.3
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 1
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 65001
    - remote-address: 192.168.0.2
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 65002
    - remote-address: 192.168.0.4
      afi-safi:
      - name: ipv4
        enabled: true
        add-path: send-receive
      enabled: true
      remote-as: 65004
