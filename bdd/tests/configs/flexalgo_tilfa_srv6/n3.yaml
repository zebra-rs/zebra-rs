# n3 — expensive third neighbour of s; makes a plain LFA impossible.
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::4/128
- if-name: n3-s
  ipv6:
    address: 2001:db8:0:3::2/64
- if-name: n3-r1
  ipv6:
    address: 2001:db8:0:6::1/64
segment-routing:
  locator:
  - name: LOC4
    prefix: fcbb:bbbb:4::/48
    behavior: usid
  - name: LOC4_A128
    prefix: fcbb:bbbb:14::/48
    behavior: usid
router:
  isis:
    net: 49.0000.0000.0000.0004.00
    hostname: n3
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: LOC4
        flex-algo-locator:
        - algo: 128
          locator: LOC4_A128
    fast-reroute:
      ti-lfa: {}
    flex-algo:
    - algo: 128
      advertise-definition: true
      dataplane:
        srv6: true
    interface:
    - if-name: lo
      ipv6:
        enabled: true
    - if-name: n3-s
      network-type: point-to-point
      metric: 1000
      ipv6:
        enabled: true
    - if-name: n3-r1
      network-type: point-to-point
      metric: 1000
      ipv6:
        enabled: true
