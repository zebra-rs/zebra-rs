prefix-set:
- name: out-test
  prefixes:
  - prefix: 10.0.0.1/32
policy:
- name: out-test
  entry:
  - number: 10
    action: permit
    match:
      prefix: out-test
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: ipv4
        enabled: true
      policy:
        out: out-test
      enabled: true
      remote-as: 65001
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.0.0.1/32
      - prefix: 10.0.0.2/32
