interface:
- if-name: lo
  ipv4:
    address: 10.0.0.3/32
- if-name: n2-s
  ipv4:
    address: 192.168.3.2/24
- if-name: n2-r1
  ipv4:
    address: 192.168.7.1/24
router:
  isis:
    net: 49.0000.0000.0000.0003.00
    hostname: n2
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 10.0.0.3
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 300
    - if-name: n2-s
      ipv4:
        enabled: true
      metric: 1
    - if-name: n2-r1
      ipv4:
        enabled: true
      metric: 1
