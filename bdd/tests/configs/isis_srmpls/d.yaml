interface:
- if-name: d-e2
  ipv4:
    address: 172.168.1.1/24
- if-name: d-n1
  ipv4:
    address: 192.168.2.2/24
- if-name: d-r3
  ipv4:
    address: 192.168.5.1/24
- if-name: lo
  ipv4:
    address: 10.0.0.8/32
router:
  isis:
    net: 49.0000.0000.0000.0008.00
    hostname: d
    is-type: level-2-only
    segment-routing:
      mpls: {}
    te-router-id: 10.0.0.8
    interface:
    - if-name: d-n1
      ipv4:
        enabled: true
      metric: 1
    - if-name: d-r3
      ipv4:
        enabled: true
      metric: 1
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 800
  static:
    ipv4:
      route:
      - prefix: 172.168.0.0/24
        nexthop:
        - address: 10.0.0.1
