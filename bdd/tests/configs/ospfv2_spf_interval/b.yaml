interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: etha
  ipv4:
    address: 10.0.12.2/30
router:
  ospf:
    router-id: 10.0.0.2
    spf-interval:
      initial-wait: 100
      secondary-wait: 300
      maximum-wait: 4000
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: etha
        enabled: true
        network-type: point-to-point
