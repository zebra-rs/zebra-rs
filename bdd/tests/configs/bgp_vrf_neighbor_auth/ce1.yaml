# CE1 (AS 65001) — TCP-MD5 password MATCHING PE1's neighbor secret, so the
# per-VRF PE-CE session authenticates and establishes.
interface:
- if-name: lo
  ipv4: {address: 10.0.1.1/32}
- if-name: pe1
  ipv4: {address: 10.1.0.2/30}
router:
  bgp:
    global: {as: 65001, router-id: 10.0.1.1}
    timer: {adv-interval: {ebgp: 3}}
    neighbor:
    - remote-address: 10.1.0.1
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      tcp-md5:
        encoding: clear
        password: "md5-c1-shared"
      afi-safi:
      - {name: ipv4, enabled: true}
