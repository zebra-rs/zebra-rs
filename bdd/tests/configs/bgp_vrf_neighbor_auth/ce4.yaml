# CE4 (AS 65004) — TCP-AO key-chain with the SAME ids/algorithm as PE1's
# AO-C4 but a DIFFERENT key-string ("ao-secret-c4-ce" vs "ao-secret-c4-pe"),
# so the AO MAC mismatches and the session never establishes. Proves the
# per-VRF tcp-ao binding is actually enforced.
key-chains:
  key-chain:
  - name: AO-C4
    key:
    - key-id: 100
      crypto-algorithm: hmac-sha-1
      send-id: 100
      recv-id: 100
      key-string:
        keystring: "ao-secret-c4-ce"
interface:
- if-name: lo
  ipv4: {address: 10.0.4.1/32}
- if-name: pe1
  ipv4: {address: 10.4.0.2/30}
router:
  bgp:
    global: {as: 65004, router-id: 10.0.4.1}
    timer: {adv-interval: {ebgp: 3}}
    neighbor:
    - remote-address: 10.4.0.1
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      tcp-ao:
        key-chain: AO-C4
        include-tcp-options: true
      afi-safi:
      - {name: ipv4, enabled: true}
