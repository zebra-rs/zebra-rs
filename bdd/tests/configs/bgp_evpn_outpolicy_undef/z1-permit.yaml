# z1 originates 10.1.0.0/24 from vrf-blue as an EVPN Type-5 route and
# advertises it to z2 over the L2VPN/EVPN address family. The EVPN
# outbound policy is bound to PERMIT-ALL, which exists and permits
# everything, so z2 receives the route.
policy:
- name: PERMIT-ALL
  entry:
  - number: 10
    action: permit
vrf:
- name: vrf-blue
  ipv4:
    route-target:
      import:
      - 65001:100
      export:
      - 65001:100
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: evpn
        enabled: true
        policy:
          out: PERMIT-ALL
      enabled: true
      remote-as: 65001
    vrf:
    - name: vrf-blue
      rd: 65001:100
      evpn:
        advertise-ipv4: true
      afi-safi:
        ipv4:
          network:
          - prefix: 10.1.0.0/24
