# z2 peers with z1 over L2VPN/EVPN and imports Type-5 routes carrying
# RT 65001:100 into vrf-blue. Mirrors the bgp_vrf_evpn_type5 receiver.
vrf:
- name: vrf-blue
  ipv4:
    route-target:
      import:
      - 65001:100
      export:
      - 65001:100
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: evpn
        enabled: true
      enabled: true
      remote-as: 65001
    vrf:
    - name: vrf-blue
      rd: 65001:200
