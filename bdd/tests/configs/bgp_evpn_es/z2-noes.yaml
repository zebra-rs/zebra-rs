# z2 — same as z2-1.yaml but with the ethernet-segment removed. Applying this
# diffs out es1, so z2 withdraws its Type-4 ES route from z1.
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.2
    afi-safi:
    - name: evpn
    neighbor:
    - remote-address: 192.168.0.1
      enabled: true
      remote-as: 65001
      afi-safi:
      - name: ipv4
        enabled: true
      - name: evpn
        enabled: true
