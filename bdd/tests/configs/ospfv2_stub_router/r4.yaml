# r4 is the expensive alternate path (cost 100+100).
interface:
- if-name: lo
  ipv4:
    address: 10.0.0.4/32
- if-name: etha
  ipv4:
    address: 10.0.14.2/30
- if-name: ethc
  ipv4:
    address: 10.0.34.1/30
router:
  ospf:
    router-id: 10.0.0.4
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: etha
        enabled: true
        network-type: point-to-point
        cost: 100
      - if-name: ethc
        enabled: true
        network-type: point-to-point
        cost: 100
