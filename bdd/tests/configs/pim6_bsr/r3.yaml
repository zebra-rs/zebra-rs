interface:
- if-name: eth5
  ipv6:
    address: 2001:db8:23::2/64
- if-name: eth6
  ipv6:
    address: 2001:db8:24::1/64
router:
  static:
    ipv6:
      route:
      - prefix: 2001:db8:22::/64
        nexthop:
        - address: 2001:db8:23::1
      - prefix: 2001:db8:21::/64
        nexthop:
        - address: 2001:db8:23::1
  pim:
    ipv6:
      interface:
      - if-name: eth5
        dr-priority: 1
      - if-name: eth6
        mld:
          enabled: true
