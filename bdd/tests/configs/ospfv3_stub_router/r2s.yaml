# on-startup variant: stub router for the first 60 seconds only.
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::2/128
- if-name: etha
  ipv6:
    address: 2001:db8:12::2/64
- if-name: ethc
  ipv6:
    address: 2001:db8:23::1/64
router:
  ospfv3:
    router-id: 10.0.0.2
    max-metric:
      router-lsa:
        on-startup: 60
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: etha
        enabled: true
        network-type: point-to-point
      - if-name: ethc
        enabled: true
        network-type: point-to-point
