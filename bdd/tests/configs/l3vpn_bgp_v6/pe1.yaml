# PE1 — provider edge 1 (AS 65000). IS-IS L2 SRv6 underlay to PE2 via P.
# iBGP VPNv6 to PE2 over v6 loopbacks. vrf-cust (encapsulation srv6) holds
# the IPv6 eBGP PE-CE session to CE1; CE-learned routes export to VPNv6
# carrying the per-VRF End.DT46 service SID from LOC1 (RT 65000:100).
vrf:
- name: vrf-cust
  ipv6:
    route-target:
      import:
      - 65000:100
      export:
      - 65000:100
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::1/128
- if-name: p
  ipv6:
    address: 2001:db8:cafe:1::1/64
- if-name: ce1
  vrf: vrf-cust
  ipv6:
    address: 2001:db8:1e::2/64
segment-routing:
  locator:
  - name: LOC1
    prefix: fcbb:bbbb:1::/48
    behavior: usid
router:
  isis:
    net: 49.0000.0000.0000.0001.00
    hostname: pe1
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: LOC1
    interface:
    - if-name: lo
      ipv6:
        enabled: true
    - if-name: p
      network-type: point-to-point
      metric: 10
      ipv6:
        enabled: true
  bgp:
    global:
      as: 65000
      router-id: 1.1.1.1
    # Cut the default 30s eBGP MRAI: the C-CE-PE chain cascades one
    # advertisement interval per eBGP hop per direction, which under a
    # loaded host overruns the e2e ping budget (~120s worst case).
    timer:
      adv-interval:
        ebgp: 3
    segment-routing:
      srv6:
        locator: LOC1
    neighbor:
    - remote-address: 2001:db8::3
      remote-as: 65000
      update-source: 2001:db8::1
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: vpnv6
        enabled: true
    vrf:
    - name: vrf-cust
      rd: 65000:1
      encapsulation: srv6
      neighbor:
      - remote-address: 2001:db8:1e::1
        remote-as: 65001
        afi-safi:
        - name: ipv6
          enabled: true
