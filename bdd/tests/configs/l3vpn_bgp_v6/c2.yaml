# C2 — customer site 2 (AS 65102). Mirror of C1: originates IPv6 loopback
# 2001:db8:c2::1/128 into BGP via `redistribute connected` and eBGPs to CE2.
interface:
- if-name: lo
  ipv6:
    address: 2001:db8:c2::1/128
- if-name: ce2
  ipv6:
    address: 2001:db8:2c::1/64
router:
  bgp:
    global:
      as: 65102
      router-id: 10.0.2.1
    # Cut the default 30s eBGP MRAI: the C-CE-PE chain cascades one
    # advertisement interval per eBGP hop per direction, which under a
    # loaded host overruns the e2e ping budget (~120s worst case).
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 2001:db8:2c::2
      remote-as: 65002
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv6
        enabled: true
    afi-safi:
    - name: ipv6
      redistribute:
        connected: {}
