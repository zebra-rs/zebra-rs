# CE1 (AS 65001) — advertises five test /32s into the VRF via `network`
# statements (originated unconditionally, no connected route needed).
# .1 is the control; .2/.3 are dropped by PE1's inbound filters; .4/.5
# survive inbound and are dropped by PE1's outbound filters toward CE2.
interface:
- if-name: lo
  ipv4:
    address: 10.0.1.1/32
- if-name: pe1
  ipv4:
    address: 10.1.0.2/30
router:
  bgp:
    global:
      as: 65001
      router-id: 10.0.1.1
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 10.1.0.1
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.0.1.1/32
      - prefix: 10.0.1.2/32
      - prefix: 10.0.1.3/32
      - prefix: 10.0.1.4/32
      - prefix: 10.0.1.5/32
