vrf:
- name: vrf-blue
  ipv4:
    route-target:
      export:
      - 65001:100
router:
  bgp:
    global:
      as: 65002
      router-id: 10.0.0.2
    timer:
      adv-interval:
        ebgp: 1
    neighbor:
    - remote-address: 192.168.0.3
      afi-safi:
      - name: vpnv4
        enabled: true
      enabled: true
      remote-as: 65003
    vrf:
    - name: vrf-blue
      rd: 65001:100
      afi-safi:
        ipv4:
          network:
          - prefix: 10.9.0.0/24
