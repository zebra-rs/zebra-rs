policy:
- name: DENY-ALL
  entry:
  - number: 10
    action: deny
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.1
    timer:
      adv-interval:
        ebgp: 1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: ipv4
        enabled: true
        policy:
          out: DENY-ALL
      enabled: true
      remote-as: 65002
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.0.0.1/32
      - prefix: 10.0.0.2/32
