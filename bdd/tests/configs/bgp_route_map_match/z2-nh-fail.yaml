policy:
- name: IN-NEXTHOP
  entry:
  - number: 10
    action: permit
    match:
      next-hop: 10.10.10.10
router:
  bgp:
    global:
      as: 65002
      router-id: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
        policy:
          in: IN-NEXTHOP
      enabled: true
      remote-as: 65001
