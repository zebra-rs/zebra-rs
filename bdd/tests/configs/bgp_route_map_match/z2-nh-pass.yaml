prefix-set:
- name: PEER-SUBNET
  prefixes:
  - prefix: 192.168.0.0/24
    le: 32
policy:
- name: IN-NEXTHOP
  entry:
  - number: 10
    match:
      next-hop: PEER-SUBNET
router:
  bgp:
    global:
      as: 65002
      identifier: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      policy:
        in: IN-NEXTHOP
      enabled: true
      peer-as: 65001
