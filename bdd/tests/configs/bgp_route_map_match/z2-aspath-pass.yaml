as-path-set:
- name: FROM-65001
  members:
  - "^65001$"
policy:
- name: IN-ASPATH
  entry:
  - number: 10
    action: permit
    match:
      as-path: FROM-65001
router:
  bgp:
    global:
      as: 65002
      router-id: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      policy:
        in: IN-ASPATH
      enabled: true
      remote-as: 65001
