as-path-set:
- name: FROM-65001
  member:
  - "^65001$"
policy-options:
  policy:
  - name: IN-ASPATH
    entry:
    - number: 10
      match:
        as-path-set: FROM-65001
router:
  bgp:
    global:
      as: 65002
      identifier: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      apply-policy:
        in: IN-ASPATH
      enabled: true
      peer-as: 65001
