policy-options:
  policy:
  - name: IN-ORIGIN
    entry:
    - number: 10
      match:
        origin: igp
router:
  bgp:
    global:
      as: 65002
      identifier: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4-unicast
        enabled: true
      apply-policy:
        in: IN-ORIGIN
      enabled: true
      peer-as: 65001
