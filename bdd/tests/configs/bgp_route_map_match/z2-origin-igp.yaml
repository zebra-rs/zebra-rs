policy:
- name: IN-ORIGIN
  entry:
  - number: 10
    action: permit
    match:
      origin: igp
router:
  bgp:
    global:
      as: 65002
      identifier: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      policy:
        in: IN-ORIGIN
      enabled: true
      remote-as: 65001
