policy:
- name: IN-MED
  entry:
  - number: 10
    action: permit
    match:
      med-eq: 100
router:
  bgp:
    global:
      as: 65002
      router-id: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      policy:
        in: IN-MED
      enabled: true
      remote-as: 65001
