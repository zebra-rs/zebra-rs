# CE2 — customer edge 2. Mirror of CE1: static route to C2's loopback via
# C2, default toward PE2.
interface:
- if-name: c2
  ipv4:
    address: 10.2.0.2/30
- if-name: pe2
  ipv4:
    address: 10.2.0.5/30
router:
  static:
    ipv4:
      route:
      - prefix: 10.0.2.1/32
        nexthop:
        - address: 10.2.0.1
      - prefix: 0.0.0.0/0
        nexthop:
        - address: 10.2.0.6
