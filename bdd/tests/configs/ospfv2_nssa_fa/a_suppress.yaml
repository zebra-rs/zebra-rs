# Same ABR with `nssa-suppress-fa`: the translated Type-5 carries
# FA 0.0.0.0, so backbone receivers route via this ABR instead of
# the forwarding address.
interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
- if-name: ethb
  ipv4:
    address: 10.0.12.1/30
- if-name: ethc
  ipv4:
    address: 10.0.13.1/30
router:
  ospf:
    router-id: 10.0.0.1
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: ethb
        enabled: true
        network-type: point-to-point
    - area-id: 0.0.0.1
      area-type: nssa
      nssa-suppress-fa: true
      interface:
      - if-name: ethc
        enabled: true
        network-type: point-to-point
