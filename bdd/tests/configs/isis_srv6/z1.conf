interface enp0s6 {
  ipv4 {
    address 192.168.10.1/24;
  }
  ipv6 {
    address 2001:db8:ff00:10::1/64;
  }
}
interface enp0s7 {
  ipv4 {
    address 192.168.3.1/24;
  }
  ipv6 {
    address 2001:db8:ff00:3::1/64;
  }
}
interface lo {
  ipv4 {
    address 10.0.0.1/32;
  }
  ipv6 {
    address 2001:db8:1::1/128;
  }
}
router {
  isis {
    net 49.0000.0000.0000.0001.00;
    is-type level-2-only;
    te-router-id 10.0.0.1;
    interface enp0s6 {
      circuit-type level-2-only;
      ipv4 {
        enabled true;
      }
      ipv6 {
        enabled true;
      }
      priority 63;
    }
    interface enp0s7;
    interface lo {
      circuit-type level-2-only;
      ipv4 {
        enabled true;
      }
    }
  }
  static {
    ipv6 {
      route 2001:db8:ff00:5::/64 {
        segments {
          fcbb:bbbb:3:fe00::;
        };
      }
    }
  }
}
segment-routing {
  locator LOC_uN1 {
    behavior usid;
    prefix fcbb:bbbb:1::/48;
  }
}

