interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
- if-name: ethb
  ipv4:
    address: 10.0.12.1/30
- if-name: ethc
  ipv4:
    address: 10.0.13.1/30
router:
  ospf:
    router-id: 10.0.0.1
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
      - if-name: ethc
        enable: true
        network-type: point-to-point
    - area-id: 0.0.0.1
      range:
      - prefix: 10.1.0.0/16
        not-advertise: true
      interface:
      - if-name: ethb
        enable: true
        network-type: point-to-point
