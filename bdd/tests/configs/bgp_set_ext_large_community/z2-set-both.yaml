ext-community-set:
- name: RT-SET
  members:
  - "rt:65002:300"
large-community-set:
- name: LC-SET
  members:
  - "65002:400:500"
policy:
- name: STAMP-BOTH
  entry:
  - number: 10
    action: permit
    set:
      ext-community:
        name: RT-SET
      large-community:
        name: LC-SET
router:
  bgp:
    global:
      as: 65002
      router-id: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
        policy:
          in: STAMP-BOTH
      enabled: true
      remote-as: 65001
