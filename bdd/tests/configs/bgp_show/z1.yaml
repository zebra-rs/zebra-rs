router:
  bgp:
    global:
      as: 65001
      identifier: 192.168.0.1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 65002
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.0.0.0/24
      - prefix: 10.0.0.128/25
      - prefix: 10.0.0.1/32
