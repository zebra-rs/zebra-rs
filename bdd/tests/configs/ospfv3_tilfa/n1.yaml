interface:
- if-name: lo
  ipv6:
    address: 2001:db8::2/128
- if-name: n1-s
  ipv6:
    address: 2001:db8:1::2/64
- if-name: n1-n2
  ipv6:
    address: 2001:db8:2::1/64
router:
  ospfv3:
    router-id: 10.0.0.2
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 200
      - if-name: n1-s
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 21
      - if-name: n1-n2
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 23
