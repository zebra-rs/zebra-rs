interface:
- if-name: lo
  ipv6:
    address: 2001:db8::1/128
- if-name: s-n1
  ipv6:
    address: 2001:db8:1::1/64
- if-name: s-d
  ipv6:
    address: 2001:db8:5::2/64
router:
  ospfv3:
    router-id: 10.0.0.1
    fast-reroute:
      ti-lfa: null
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 100
      - if-name: s-n1
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 12
      - if-name: s-d
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 15
