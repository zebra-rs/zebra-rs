interface:
- if-name: lo
  ipv6:
    address: 2001:db8::5/128
- if-name: d-n3
  ipv6:
    address: 2001:db8:4::2/64
- if-name: d-s
  ipv6:
    address: 2001:db8:5::1/64
router:
  ospfv3:
    router-id: 10.0.0.5
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 500
      - if-name: d-n3
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 54
      - if-name: d-s
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 51
