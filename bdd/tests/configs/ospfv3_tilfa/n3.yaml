interface:
- if-name: lo
  ipv6:
    address: 2001:db8::4/128
- if-name: n3-n2
  ipv6:
    address: 2001:db8:3::2/64
- if-name: n3-d
  ipv6:
    address: 2001:db8:4::1/64
router:
  ospfv3:
    router-id: 10.0.0.4
    segment-routing:
      mpls: null
    fast-reroute:
      ti-lfa: null
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 400
      - if-name: n3-n2
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 43
      - if-name: n3-d
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 45
