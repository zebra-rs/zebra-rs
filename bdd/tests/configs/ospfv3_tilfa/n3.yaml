interface:
- if-name: lo
  ipv6:
    address: 2001:db8::4/128
- if-name: n3-s
  ipv6:
    address: 2001:db8:3::2/64
- if-name: n3-r1
  ipv6:
    address: 2001:db8:6::1/64
router:
  ospfv3:
    router-id: 10.0.0.4
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 400
      - if-name: n3-s
        enable: true
        network-type: point-to-point
        cost: 1000
        adjacency-sid:
          index: 41
      - if-name: n3-r1
        enable: true
        network-type: point-to-point
        cost: 1000
        adjacency-sid:
          index: 45
