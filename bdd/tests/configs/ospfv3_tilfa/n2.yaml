interface:
- if-name: lo
  ipv6:
    address: 2001:db8::3/128
- if-name: n2-n1
  ipv6:
    address: 2001:db8:2::2/64
- if-name: n2-n3
  ipv6:
    address: 2001:db8:3::1/64
router:
  ospfv3:
    router-id: 10.0.0.3
    segment-routing:
      mpls: null
    fast-reroute:
      ti-lfa: null
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 300
      - if-name: n2-n1
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 32
      - if-name: n2-n3
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 34
