interface:
- if-name: lo
  ipv6:
    address: 2001:db8::3/128
- if-name: n2-s
  ipv6:
    address: 2001:db8:2::2/64
- if-name: n2-r1
  ipv6:
    address: 2001:db8:5::1/64
router:
  ospfv3:
    router-id: 10.0.0.3
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 300
      - if-name: n2-s
        enable: true
        network-type: point-to-point
        cost: 1
        adjacency-sid:
          index: 31
      - if-name: n2-r1
        enable: true
        network-type: point-to-point
        cost: 1
        adjacency-sid:
          index: 35
