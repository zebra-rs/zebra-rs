interface:
- if-name: lo
  ipv6:
    address: 2001:db8::3/128
- if-name: etha
  ipv6:
    address: 2001:db8:13::2/64
router:
  ospfv3:
    router-id: 10.0.0.3
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: etha
        enabled: true
        network-type: point-to-point
