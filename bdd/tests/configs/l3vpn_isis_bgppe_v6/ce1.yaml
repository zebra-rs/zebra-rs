# CE1 — customer edge 1 (AS 65001). IS-IS (IPv6) toward C1, IPv6 eBGP
# toward PE1, mutual redistribution: redistribute isis -> BGP (up),
# redistribute bgp -> IS-IS (down).
interface:
- if-name: c1
  ipv6:
    address: 2001:db8:1c::2/64
- if-name: pe1
  ipv6:
    address: 2001:db8:1e::1/64
router:
  isis:
    net: 49.0001.0000.0000.0012.00
    hostname: ce1
    is-type: level-2-only
    afi-safi:
    - name: ipv6
      redistribute:
        bgp: {}
    interface:
    - if-name: c1
      circuit-type: level-2-only
      network-type: point-to-point
      metric: 10
      ipv6:
        enable: true
  bgp:
    global:
      as: 65001
      router-id: 10.1.0.5
    neighbor:
    - remote-address: 2001:db8:1e::2
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv6
        enabled: true
    afi-safi:
    - name: ipv6
      redistribute:
        isis: {}
        connected: {}
