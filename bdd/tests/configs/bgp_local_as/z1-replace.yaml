interface:
- if-name: i1
  ipv4:
    address: 192.168.0.1/24
router:
  bgp:
    global:
      as: 65100
      router-id: 192.168.0.1
    timer:
      adv-interval:
        ibgp: 1
        ebgp: 1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 65001
      # replace-as: egress prepends only the substitute — z2 sees
      # "64999" with the real AS 65100 hidden entirely.
      local-as:
      - as-number: 64999
        replace-as: true
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.0.0.1/32
