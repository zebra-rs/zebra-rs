interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
- if-name: ethb
  ipv4:
    address: 10.0.12.1/30
router:
  ospf:
    router-id: 10.0.0.1
    # Non-default MinLSArrival (RFC 2328 §13), surfaced by `show ospf`
    # so the BDD can confirm it reached the instance.
    min-ls-arrival: 2000
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: ethb
        enabled: true
        network-type: point-to-point
