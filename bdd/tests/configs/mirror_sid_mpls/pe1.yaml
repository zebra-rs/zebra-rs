# pe1 — the ingress PE. IS-IS L2 + segment-routing mpls (loopback
# Prefix-SID index 1 -> transport label 16001), iBGP VPNv4 to pea and peb
# over loopbacks, VRF vrf-cust holding ce1. It learns ce2's prefix from
# pea (the primary egress) and forwards over the SR-MPLS transport LSP:
# [prefix-SID-to-pea | VPN-label]. pe1 connects only to pea in the core
# and reaches peb via pea (which stays up — this is egress *link*
# protection), so it always forwards ce2-bound traffic toward pea.
vrf:
- name: vrf-cust
  ipv4:
    route-target:
      import:
      - 65000:100
      export:
      - 65000:100
interface:
- if-name: lo
  ipv4:
    address: 1.1.1.1/32
- if-name: pe1-pea
  ipv4:
    address: 10.0.13.1/30
- if-name: ce1
  vrf: vrf-cust
  ipv4:
    address: 10.1.1.1/30
router:
  isis:
    net: 49.0000.0000.0000.0001.00
    hostname: pe1
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 1.1.1.1
    interface:
    - if-name: lo
      ipv4:
        enabled: true
        prefix-sid:
          index: 1
    - if-name: pe1-pea
      network-type: point-to-point
      metric: 10
      ipv4:
        enabled: true
  bgp:
    global:
      as: 65000
      router-id: 1.1.1.1
    timer:
      adv-interval:
        ibgp: 1
    neighbor:
    - remote-address: 1.1.1.3
      remote-as: 65000
      update-source: 1.1.1.1
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
    - remote-address: 1.1.1.4
      remote-as: 65000
      update-source: 1.1.1.1
      enabled: true
      afi-safi:
      - name: vpnv4
        enabled: true
    vrf:
    - name: vrf-cust
      rd: 65000:1
      afi-safi:
        ipv4:
          network:
          - prefix: 10.1.1.0/30
