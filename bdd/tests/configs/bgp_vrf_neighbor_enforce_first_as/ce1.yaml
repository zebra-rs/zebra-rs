# CE1 (AS 65001) — advertises 10.0.1.1/32 with a prepended foreign AS 65099
# (via an outbound route-map on that prefix only) and 10.0.1.2/32 normally.
interface:
- {if-name: lo, ipv4: {address: 10.0.1.1/32}}
- {if-name: pe1, ipv4: {address: 10.1.0.2/30}}
prefix-set:
- name: ONE
  prefixes:
  - prefix: 10.0.1.1/32
policy:
- name: PREPEND-FOREIGN
  entry:
  - number: 10
    action: permit
    match: {prefix-set: ONE}
    set: {as-path-prepend: {asn: 65099}}
  - number: 20
    action: permit
router:
  bgp:
    global: {as: 65001, router-id: 10.0.1.1}
    timer: {adv-interval: {ebgp: 3}}
    neighbor:
    - remote-address: 10.1.0.1
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
        policy: {out: PREPEND-FOREIGN}
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.0.1.1/32
      - prefix: 10.0.1.2/32
