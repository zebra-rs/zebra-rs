prefix-set:
- name: HOGE
  prefixes:
  - prefix: 1.1.1.1/32
  - prefix: 2.2.2.2/32
policy:
- name: HOGE
  entry:
  - number: 10
    action: permit
    match:
      prefix: HOGE
router:
  bgp:
    global:
      as: 65002
      identifier: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      policy:
        in: HOGE
      enabled: true
      remote-as: 65001
