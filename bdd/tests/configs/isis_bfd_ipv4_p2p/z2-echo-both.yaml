system:
  ebpf:
    enabled: true
interface:
- if-name: lo
  ipv4:
    address: 10.255.0.2/32
- if-name: i1
  ipv4:
    address: 10.0.1.2/24
  ebpf:
    enabled: true
router:
  isis:
    net: 49.0001.0000.0000.0002.00
    is-type: level-2-only
    hostname: z2
    interface:
    - if-name: lo
      circuit-type: level-2-only
      ipv4:
        enabled: true
    - if-name: i1
      circuit-type: level-2-only
      network-type: point-to-point
      ipv4:
        enabled: true
      bfd:
        enabled: true
        echo-mode: both
