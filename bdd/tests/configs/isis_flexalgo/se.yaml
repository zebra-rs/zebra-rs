affinity-map:
  affinity:
  - name: us
    bit-position: 0
  - name: transatlantic
    bit-position: 1
  - name: eu
    bit-position: 2

interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
- if-name: se-ch
  ipv4:
    address: 192.168.1.1/30

router:
  isis:
    net: 49.0001.0000.0000.0001.00
    hostname: se
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 10.0.0.1
    interface:
    - if-name: lo
      ipv4:
        enable: true
        prefix-sid:
          index: 1
        flex-algo-prefix-sid:
        - algo: 128
          index: 11
        - algo: 129
          index: 21
    - if-name: se-ch
      ipv4:
        enable: true
      affinity:
      - us
    flex-algo:
    - algo: 128
      advertise-definition: false
      dataplane:
        sr-mpls: true
      affinity:
        exclude-any:
        - eu
        - transatlantic
    - algo: 129
      advertise-definition: false
      dataplane:
        sr-mpls: true
      affinity:
        exclude-any:
        - transatlantic
        - us
