affinity-map:
  affinity:
  - name: us
    bit-position: 0
  - name: transatlantic
    bit-position: 1
  - name: eu
    bit-position: 2

interface:
- if-name: lo
  ipv4:
    address: 10.0.0.5/32
- if-name: fr-va
  ipv4:
    address: 192.168.1.14/30
- if-name: fr-ln
  ipv4:
    address: 192.168.1.18/30

router:
  isis:
    net: 49.0001.0000.0000.0005.00
    hostname: fr
    is-type: level-2-only
    segment-routing: mpls
    te-router-id: 10.0.0.5
    interface:
    - if-name: lo
      ipv4:
        enable: true
        prefix-sid:
          index: 5
        flex-algo-prefix-sid:
        - algo: 128
          index: 15
        - algo: 129
          index: 25
    - if-name: fr-va
      ipv4:
        enable: true
      affinity:
      - transatlantic
    - if-name: fr-ln
      ipv4:
        enable: true
      affinity:
      - eu
    flex-algo:
    - algo: 128
      advertise-definition: false
      dataplane:
        sr-mpls: true
      affinity:
        exclude-any:
        - eu
        - transatlantic
    - algo: 129
      advertise-definition: false
      dataplane:
        sr-mpls: true
      affinity:
        exclude-any:
        - transatlantic
        - us
