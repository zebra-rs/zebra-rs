router:
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.1
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 2001:db8::2
      afi-safi:
      - name: ipv6
        enabled: true
      enabled: true
      remote-as: 65001
      route-reflector:
        client: true
    - remote-address: 2001:db8::3
      afi-safi:
      - name: ipv6
        enabled: true
      enabled: true
      remote-as: 65001
      route-reflector:
        client: true
