# CE1 (AS 65001) — advertises 10.0.1.1/32 with next-hop 10.1.0.2 (its own
# link address). PE1's egress toward the other CEs rewrites or preserves
# that next-hop per each neighbor's next-hop knob.
interface:
- {if-name: lo, ipv4: {address: 10.0.1.1/32}}
- {if-name: pe1, ipv4: {address: 10.1.0.2/30}}
router:
  bgp:
    global: {as: 65001, router-id: 10.0.1.1}
    timer: {adv-interval: {ebgp: 3}}
    neighbor:
    - remote-address: 10.1.0.1
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi: [{name: ipv4, enabled: true}]
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.0.1.1/32
