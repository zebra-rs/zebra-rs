# CE3 (AS 65003) — receiver; observes PE1's advertised next-hop.
interface:
- {if-name: lo, ipv4: {address: 10.0.3.1/32}}
- {if-name: pe1, ipv4: {address: 10.3.0.2/30}}
router:
  bgp:
    global: {as: 65003, router-id: 10.0.3.1}
    timer: {adv-interval: {ebgp: 3, ibgp: 3}}
    neighbor:
    - remote-address: 10.3.0.1
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi: [{name: ipv4, enabled: true}]
