interface:
- if-name: lo
  ipv4:
    address: 10.0.0.6/32
- if-name: ethc
  ipv4:
    address: 10.0.36.2/30
router:
  ospf:
    router-id: 10.0.0.6
    area:
    - area-id: 0.0.0.2
      interface:
      - if-name: lo
        enable: true
      - if-name: ethc
        enable: true
        network-type: point-to-point
