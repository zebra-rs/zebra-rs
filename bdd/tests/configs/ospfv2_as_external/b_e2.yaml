interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: etha
  ipv4:
    address: 10.0.12.2/30
- if-name: ethc
  ipv4:
    address: 10.0.23.1/30
- if-name: ethd
  ipv4:
    address: 10.0.24.1/30
router:
  ospf:
    router-id: 10.0.0.2
    redistribute:
      connected:
        metric: 20
        metric-type: type-2
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: etha
        enabled: true
        network-type: point-to-point
      - if-name: ethc
        enabled: true
        network-type: point-to-point
      - if-name: ethd
        enabled: true
        network-type: point-to-point
