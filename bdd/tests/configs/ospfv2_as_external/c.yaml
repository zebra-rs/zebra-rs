interface:
- if-name: lo
  ipv4:
    address: 10.0.0.3/32
- if-name: ethb
  ipv4:
    address: 10.0.23.2/30
- if-name: ethd
  ipv4:
    address: 10.0.34.1/30
- if-name: ethf
  ipv4:
    address: 10.0.36.1/30
router:
  ospf:
    router-id: 10.0.0.3
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
      - if-name: ethb
        enable: true
        network-type: point-to-point
      - if-name: ethd
        enable: true
        network-type: point-to-point
        cost: 20
    - area-id: 0.0.0.2
      interface:
      - if-name: ethf
        enable: true
        network-type: point-to-point
