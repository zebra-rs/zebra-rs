# z1 — MUP PE that originates an Interwork Segment Discovery (ISD) route in
# VRF N6 and advertises it to z2 over iBGP (mup afi-safi). When z1 is stopped
# (the "remote peer goes down" case) z2 must withdraw the ISD from BOTH its
# main MUP Loc-RIB and its RT-importing VRF copy.
#
#   * VRF N6 (rd 65501:20, `encapsulation srv6`) carves a per-VRF End.DT46 SID
#     from locator S and originates an ISD under prefix 10.60.0.0/16, carrying
#     its export RT 65501:10.
vrf:
- name: N6
  mup:
    route-target:
      export:
      - "65501:10"
      import:
      - "65501:10"
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::1/128
- if-name: z1-z2
  ipv6:
    address: 2001:db8:0:12::1/64
segment-routing:
  locator:
  - name: S
    prefix: fcbb:bbbb:1::/48
    behavior: usid
router:
  isis:
    net: 49.0000.0000.0000.0001.00
    hostname: z1
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: S
    interface:
    - if-name: lo
      ipv6:
        enabled: true
    - if-name: z1-z2
      network-type: point-to-point
      metric: 1
      ipv6:
        enabled: true
  bgp:
    global:
      as: 65501
      router-id: 10.0.0.1
    timer:
      adv-interval:
        ibgp: 1
    segment-routing:
      srv6:
        locator: S
    neighbor:
    - remote-address: 2001:db8::2
      remote-as: 65501
      update-source: 2001:db8::1
      enabled: true
      afi-safi:
      - name: mup
        enabled: true
    vrf:
    - name: N6
      rd: "65501:20"
      encapsulation: srv6
      afi-safi:
        mup:
          segment:
          - type: interwork
            prefix: 10.60.0.0/16
