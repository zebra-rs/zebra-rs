# z2 — VTEP-B (GBP enforcer). Receives z1's EVPN Type-2 route carrying
# the GPI extended community; the import Lua hook recovers the tag and
# programs the matching nftables set, and the withdraw hook removes it.
vxlan:
- name: vxlan10
  vni: 10
  local-address: 192.168.0.2
router:
  bgp:
    global:
      as: 65001
      router-id: 192.168.0.2
    lua-script:
    # The shipped example script (validated by its own engine unit test).
    # Paths resolve from the daemon's cwd, which is the BDD runner's dir.
    - name: GBP
      source-path: ../etc/zebra-rs/lua/gbp-example.lua
    loc-rib-hook:
      l2vpn-evpn:
        import: GBP
        withdraw: GBP
    afi-safi:
    - name: evpn
      advertise-all-vni: true
    neighbor:
    - remote-address: 192.168.0.1
      enabled: true
      remote-as: 65001
      afi-safi:
      - name: ipv4
        enabled: true
      - name: evpn
        enabled: true
