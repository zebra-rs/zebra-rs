# Full restatement of z2-1.yaml plus per-neighbor ttl-security — the
# conventional spelling on the far end, against z1's group-inherited
# GTSM (see z1-3.yaml).
router:
  bgp:
    global:
      as: 65002
      router-id: 192.168.0.2
    neighbor:
    - remote-address: 192.168.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 65001
      ttl-security: {}
