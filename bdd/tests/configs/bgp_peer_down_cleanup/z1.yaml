interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
  ipv6:
    address: 2001:db8::1/128
- if-name: z1-z2
  ipv4:
    address: 192.168.0.1/30
  ipv6:
    address: 2001:db8:12::1/64
router:
  bgp:
    global:
      as: 65001
      router-id: 10.0.0.1
    neighbor:
    - remote-address: 192.168.0.2
      remote-as: 65002
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
      - name: ipv6
        enabled: true
    afi-safi:
    - name: ipv4
      redistribute:
        connected: null
    - name: ipv6
      redistribute:
        connected: null
