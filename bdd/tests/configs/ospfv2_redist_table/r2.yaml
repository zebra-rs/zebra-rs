# r2 redistributes kernel routing table 100 (routes installed
# externally via `ip route ... table 100`) as Type-5 externals at
# metric 30.
interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: etha
  ipv4:
    address: 10.0.12.2/30
router:
  ospf:
    router-id: 10.0.0.2
    redistribute:
      table:
      - id: 100
        metric: 30
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: etha
        enabled: true
        network-type: point-to-point
