# n2 — SRv6 sibling of configs/ospfv3_tilfa: SR-MPLS and
# Prefix-SIDs replaced by a uSID locator; same costs and topology.
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::3/128
- if-name: n2-s
  ipv6:
    address: 2001:db8:2::2/64
- if-name: n2-r1
  ipv6:
    address: 2001:db8:5::1/64
segment-routing:
  locator:
  - name: LOC3
    prefix: fcbb:bbbb:3::/48
    behavior: usid
router:
  ospfv3:
    router-id: 10.0.0.3
    segment-routing:
      srv6:
        locator: LOC3
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
      - if-name: n2-s
        enable: true
        network-type: point-to-point
        cost: 1
      - if-name: n2-r1
        enable: true
        network-type: point-to-point
        cost: 1
