# d — SRv6 sibling of configs/ospfv3_tilfa: SR-MPLS and
# Prefix-SIDs replaced by a uSID locator; same costs and topology.
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::8/128
- if-name: d-n1
  ipv6:
    address: 2001:db8:10::2/64
- if-name: d-r3
  ipv6:
    address: 2001:db8:11::2/64
segment-routing:
  locator:
  - name: LOC8
    prefix: fcbb:bbbb:8::/48
    behavior: usid
router:
  ospfv3:
    router-id: 10.0.0.8
    segment-routing:
      srv6:
        locator: LOC8
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: d-n1
        enabled: true
        network-type: point-to-point
        cost: 1
      - if-name: d-r3
        enabled: true
        network-type: point-to-point
        cost: 1
