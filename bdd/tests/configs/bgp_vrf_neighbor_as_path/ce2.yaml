# CE2 (AS 65001) — receiver used to observe PE1's egress AS-path rewrite
# toward this neighbor. Shares AS 65001 with CE1, so it accepts CE1s route ONLY because PE1 as-overrides the shared AS.
interface:
- if-name: lo
  ipv4:
    address: 10.0.2.1/32
- if-name: pe1
  ipv4:
    address: 10.2.0.2/30
router:
  bgp:
    global:
      as: 65001
      router-id: 10.0.2.1
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 10.2.0.1
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.0.2.1/32
