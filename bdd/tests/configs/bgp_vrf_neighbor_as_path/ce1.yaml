# CE1 (AS 65001) — advertises 10.0.1.1/32 (the as-override / remove-private-as
# probe) and 10.0.1.9/32. An outbound route-map prepends PE1's own AS (65000)
# onto 10.0.1.9/32 only, so that route reaches PE1 with 65000 already in the
# AS_PATH — the condition PE1's `allowas-in` on this neighbor must permit.
interface:
- if-name: lo
  ipv4:
    address: 10.0.1.1/32
- if-name: pe1
  ipv4:
    address: 10.1.0.2/30
prefix-set:
- name: NINE
  prefixes:
  - prefix: 10.0.1.9/32
policy:
- name: PREPEND-PE
  entry:
  - number: 10
    action: permit
    match:
      prefix-set: NINE
    set:
      as-path-prepend:
        asn: 65000
  - number: 20
    action: permit
router:
  bgp:
    global:
      as: 65001
      router-id: 10.0.1.1
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 10.1.0.1
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
        policy:
          out: PREPEND-PE
    afi-safi:
    - name: ipv4
      network:
      - prefix: 10.0.1.1/32
      - prefix: 10.0.1.9/32
