interface:
- if-name: lo
  ipv4:
    address: 10.255.0.1/32
- if-name: vz1ns
  ipv4:
    address: 10.0.1.1/24
router:
  isis:
    net: 49.0001.0000.0000.0001.00
    is-type: level-2-only
    hostname: z1
    # Tight LSP MTU (400) forces z1's self-LSP to fragment. 600 /32
    # networks at 9 wire bytes each in TLV 135 far exceed one fragment,
    # so z1 originates ~15-20 LSP fragments. On this broadcast LAN the
    # Designated IS must summarise the whole LSDB (>= 16 LSPs) in its
    # periodic CSNP, and the acking routers may PSNP >= 16 entries — the
    # exact >15-entry condition that used to wrap the one-octet TLV 9
    # Length byte and corrupt the CSNP/PSNP on the wire.
    lsp-mtu-size: 400
    afi-safi:
    - name: ipv4
      network:
      - prefix: 100.64.0.1/32
      - prefix: 100.64.0.2/32
