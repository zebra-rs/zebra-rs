interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: n1-s
  ipv4:
    address: 192.168.1.2/30
- if-name: n1-n2
  ipv4:
    address: 192.168.2.1/30
router:
  ospf:
    router-id: 10.0.0.2
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 200
      - if-name: n1-s
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 21
      - if-name: n1-n2
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 23
