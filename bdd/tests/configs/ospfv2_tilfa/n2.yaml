interface:
- if-name: lo
  ipv4:
    address: 10.0.0.3/32
- if-name: n2-n1
  ipv4:
    address: 192.168.2.2/30
- if-name: n2-n3
  ipv4:
    address: 192.168.3.1/30
router:
  ospf:
    router-id: 10.0.0.3
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 300
      - if-name: n2-n1
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 32
      - if-name: n2-n3
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 34
