interface:
- if-name: lo
  ipv4:
    address: 10.0.0.7/32
- if-name: r3-r2
  ipv4:
    address: 192.168.0.34/30
- if-name: r3-d
  ipv4:
    address: 192.168.0.42/30
router:
  ospf:
    router-id: 10.0.0.7
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 700
      - if-name: r3-r2
        enable: true
        network-type: point-to-point
        cost: 1000
      - if-name: r3-d
        enable: true
        network-type: point-to-point
        cost: 1
