interface:
- if-name: lo
  ipv4:
    address: 10.0.0.4/32
- if-name: n3-n2
  ipv4:
    address: 192.168.3.2/30
- if-name: n3-d
  ipv4:
    address: 192.168.4.1/30
router:
  ospf:
    router-id: 10.0.0.4
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 400
      - if-name: n3-n2
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 43
      - if-name: n3-d
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 45
