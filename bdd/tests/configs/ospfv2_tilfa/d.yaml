interface:
- if-name: lo
  ipv4:
    address: 10.0.0.5/32
- if-name: d-n3
  ipv4:
    address: 192.168.4.2/30
- if-name: d-s
  ipv4:
    address: 192.168.5.1/30
router:
  ospf:
    router-id: 10.0.0.5
    segment-routing:
      mpls: {}
    fast-reroute:
      ti-lfa: {}
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 500
      - if-name: d-n3
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 54
      - if-name: d-s
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 51
