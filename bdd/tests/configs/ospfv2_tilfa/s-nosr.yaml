interface:
- if-name: lo
  ipv4:
    address: 10.0.0.1/32
- if-name: s-n1
  ipv4:
    address: 192.168.1.1/30
- if-name: s-d
  ipv4:
    address: 192.168.5.2/30
router:
  ospf:
    router-id: 10.0.0.1
    fast-reroute:
      ti-lfa: null
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
        prefix-sid:
          index: 100
      - if-name: s-n1
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 12
      - if-name: s-d
        enable: true
        network-type: point-to-point
        adjacency-sid:
          index: 15
