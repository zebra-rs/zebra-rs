interface:
- if-name: lo
  ipv4:
    address: 192.168.11.1/32
- if-name: eth1
  ipv4:
    address: 10.0.12.1/30
router:
  ospf:
    router-id: 1.1.1.1
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
      - if-name: eth1
        enable: true
        network-type: point-to-point
