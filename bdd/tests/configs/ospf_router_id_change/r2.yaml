interface:
- if-name: lo
  ipv4:
    address: 192.168.22.1/32
- if-name: eth2
  ipv4:
    address: 10.0.12.2/30
router:
  ospf:
    router-id: 2.2.2.2
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enabled: true
      - if-name: eth2
        enabled: true
        network-type: point-to-point
