community-set:
- name: comm-no-advertise
  members:
  - no-advertise
prefix-set:
- name: adv-1111
  prefixes:
  - prefix: 1.1.1.1/32
policy:
- name: set-no-advertise
  entry:
  - number: 10
    action: permit
    match:
      prefix: adv-1111
    set:
      community:
        name: comm-no-advertise
router:
  bgp:
    global:
      as: 65001
      identifier: 192.168.0.1
    neighbor:
    - remote-address: 192.168.0.2
      afi-safi:
      - name: ipv4
        enabled: true
      policy:
        out: set-no-advertise
      enabled: true
      remote-as: 65002
    afi-safi:
    - name: ipv4
      network:
      - prefix: 1.1.1.1/32
