interface:
- if-name: lo
  ipv4:
    address: 10.0.0.5/32
  ipv6:
    address: 2001:db8:0:ffff::5/128
- if-name: i4
  ipv4:
    address: 10.0.4.2/30
  ipv6:
    address: 2001:db8:4::2/64
- if-name: i10
  ipv4:
    address: 10.0.13.1/30
  ipv6:
    address: 2001:db8:13::1/64
router:
  isis:
    net: 49.0001.0000.0000.0005.00
    is-type: level-1
    hostname: z5
    area-password:
      password: zebra-isis-secret
      auth-type: hmac-sha-256
      key-id: 1
    interface:
    - if-name: lo
      circuit-type: level-1
      ipv4:
        enable: true
      ipv6:
        enable: true
    - if-name: i4
      circuit-type: level-1
      network-type: point-to-point
      metric: 10
      ipv4:
        enable: true
      ipv6:
        enable: true
      hello-authentication:
        password: zebra-isis-secret
        auth-type: hmac-sha-256
        key-id: 1
    - if-name: i10
      circuit-type: level-1
      network-type: point-to-point
      metric: 40
      ipv4:
        enable: true
      ipv6:
        enable: true
      hello-authentication:
        password: zebra-isis-secret
        auth-type: hmac-sha-256
        key-id: 1
