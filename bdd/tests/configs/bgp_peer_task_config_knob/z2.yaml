router:
  bgp:
    global:
      as: 65002
      router-id: 10.0.0.2
    shards: 4
    peer-task: true
    timer:
      adv-interval:
        ebgp: 1
    neighbor:
    - remote-address: 10.0.0.1
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 65001
    - remote-address: 10.0.0.3
      afi-safi:
      - name: ipv4
        enabled: true
      enabled: true
      remote-as: 65003
