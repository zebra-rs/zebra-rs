interface lo {
  ipv4 {
    address 10.0.0.1/32;
  }
  ipv6 {
    address 2001:db8::1/128;
  }
}
interface i2 {
  ipv4 {
    address 10.0.12.1/30;
  }
  ipv6 {
    address 2001:db8:12::1/64;
  }
}
router {
  isis {
    net 49.0000.0000.0000.0001.00;
    is-type level-2-only;
    segment-routing {
      srv6 {
        locator LX1;
      }
    }
    interface lo {
      circuit-type level-2-only;
      ipv4 {
        enabled true;
      }
    }
    interface i2 {
      circuit-type level-2-only;
      network-type point-to-point;
      ipv4 {
        enabled true;
      }
    }
  }
}
segment-routing {
  locator LX1 {
    prefix fcbb:1::/64;
  }
}
