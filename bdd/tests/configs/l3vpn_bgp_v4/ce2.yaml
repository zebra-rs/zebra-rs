# CE2 — customer edge 2 (AS 65002). Mirror of CE1: eBGP relay between C2
# (AS 65102) and PE2 (AS 65000).
interface:
- if-name: c2
  ipv4:
    address: 10.2.0.2/30
- if-name: pe2
  ipv4:
    address: 10.2.0.5/30
router:
  bgp:
    global:
      as: 65002
      router-id: 10.2.0.5
    # Cut the default 30s eBGP MRAI: the C-CE-PE chain cascades one
    # advertisement interval per eBGP hop per direction, which under a
    # loaded host overruns the e2e ping budget (~120s worst case).
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 10.2.0.1
      remote-as: 65102
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
    - remote-address: 10.2.0.6
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
