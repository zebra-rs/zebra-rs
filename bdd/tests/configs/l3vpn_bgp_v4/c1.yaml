# C1 — customer site 1 (AS 65101). Originates its loopback 10.0.1.1/32
# into BGP via `redistribute connected` and eBGPs to CE1. The loopback
# is the ping target reached from C2 across the MPLS/VPN core.
interface:
- if-name: lo
  ipv4:
    address: 10.0.1.1/32
- if-name: ce1
  ipv4:
    address: 10.1.0.1/30
router:
  bgp:
    global:
      as: 65101
      router-id: 10.0.1.1
    # Cut the default 30s eBGP MRAI: the C-CE-PE chain cascades one
    # advertisement interval per eBGP hop per direction, which under a
    # loaded host overruns the e2e ping budget (~120s worst case).
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 10.1.0.2
      remote-as: 65001
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
    afi-safi:
    - name: ipv4
      redistribute:
        connected: {}
