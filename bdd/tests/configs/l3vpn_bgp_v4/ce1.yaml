# CE1 — customer edge 1 (AS 65001). eBGP relay between C1 (AS 65101) and
# PE1 (AS 65000); re-advertises C1's loopback up to PE1 and PE1's
# VPN-learned remote routes back down to C1. No VRF (CE is customer space).
interface:
- if-name: c1
  ipv4:
    address: 10.1.0.2/30
- if-name: pe1
  ipv4:
    address: 10.1.0.5/30
router:
  bgp:
    global:
      as: 65001
      router-id: 10.1.0.5
    # Cut the default 30s eBGP MRAI: the C-CE-PE chain cascades one
    # advertisement interval per eBGP hop per direction, which under a
    # loaded host overruns the e2e ping budget (~120s worst case).
    timer:
      adv-interval:
        ebgp: 3
    neighbor:
    - remote-address: 10.1.0.1
      remote-as: 65101
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
    - remote-address: 10.1.0.6
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi:
      - name: ipv4
        enabled: true
