# ethc is passive: its /30 keeps advertising into the area as a stub
# prefix, but b sends and accepts no Hellos on it — c never becomes a
# neighbor.
interface:
- if-name: lo
  ipv4:
    address: 10.0.0.2/32
- if-name: etha
  ipv4:
    address: 10.0.12.2/30
- if-name: ethc
  ipv4:
    address: 10.0.23.1/30
router:
  ospf:
    router-id: 10.0.0.2
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
      - if-name: etha
        enable: true
        network-type: point-to-point
      - if-name: ethc
        enable: true
        network-type: point-to-point
        passive: true
