# PE1 — provider edge 1 (AS 65000). Global IS-IS L2 SRv6 core to PE2 via
# P; iBGP VPNv6. Per-VRF OSPFv3 in vrf-cust toward CE1 with two-way
# redistribution: redistribute ospf -> VPNv6 (up), redistribute bgp ->
# OSPFv3 AS-External (down). The VRF carries End.DT46 (encapsulation srv6).
vrf:
- name: vrf-cust
  ipv6:
    route-target:
      import:
      - 65000:100
      export:
      - 65000:100
interface:
- if-name: lo
  ipv6:
    address: 2001:db8::1/128
- if-name: p
  ipv6:
    address: 2001:db8:cafe:1::1/64
- if-name: ce1
  vrf: vrf-cust
  ipv6:
    address: 2001:db8:1e::2/64
segment-routing:
  locator:
  - name: LOC1
    prefix: fcbb:bbbb:1::/48
    behavior: usid
router:
  isis:
    net: 49.0000.0000.0000.0001.00
    hostname: pe1
    is-type: level-2-only
    segment-routing:
      srv6:
        locator: LOC1
    interface:
    - if-name: lo
      ipv6:
        enable: true
    - if-name: p
      network-type: point-to-point
      metric: 10
      ipv6:
        enable: true
  ospfv3:
    vrf:
    - name: vrf-cust
      router-id: 1.1.1.1
      redistribute:
        bgp:
          metric: 20
      area:
      - area-id: 0.0.0.0
        interface:
        - if-name: ce1
          enable: true
          network-type: point-to-point
  bgp:
    global:
      as: 65000
      router-id: 1.1.1.1
    segment-routing:
      srv6:
        locator: LOC1
    neighbor:
    - remote-address: 2001:db8::3
      remote-as: 65000
      timers: {connect-retry-time: 3}
      update-source: 2001:db8::1
      enabled: true
      afi-safi:
      - name: vpnv6
        enabled: true
    vrf:
    - name: vrf-cust
      rd: 65000:1
      encapsulation: srv6
      afi-safi:
        ipv6:
          redistribute:
            ospf: {}
