# C2 — customer site 2. Mirror of C1: OSPFv3 to CE2; loopback
# 2001:db8:c2::1/128 + C-CE link advertised intra-area.
interface:
- if-name: lo
  ipv6:
    address: 2001:db8:c2::1/128
- if-name: ce2
  ipv6:
    address: 2001:db8:2c::1/64
router:
  ospfv3:
    router-id: 10.0.2.1
    area:
    - area-id: 0.0.0.0
      interface:
      - if-name: lo
        enable: true
      - if-name: ce2
        enable: true
        network-type: point-to-point
