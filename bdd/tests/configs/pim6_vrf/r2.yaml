vrf:
- name: mvrf
interface:
- if-name: eth2
  vrf: mvrf
  ipv6:
    address: 2001:db8:13::2/64
- if-name: eth5
  vrf: mvrf
  ipv6:
    address: 2001:db8:15::1/64
router:
  static:
    vrf:
    - name: mvrf
      ipv6:
        route:
        - prefix: 2001:db8:14::/64
          nexthop:
          - address: 2001:db8:13::1
  pim:
    vrf:
    - name: mvrf
      ipv6:
        interface:
        - if-name: eth2
          dr-priority: 1
        - if-name: eth5
          mld:
            enabled: true
