# PE1 (AS 65000) — route reflector for three iBGP CE clients in vrf-cust.
# CE1 (a plain iBGP peer) originates 10.0.1.1/32. iBGP-learned routes are
# NOT re-advertised to other iBGP peers unless that peer is a
# route-reflector client:
#   * CE2 — route-reflector client  → receives CE1's 10.0.1.1/32
#   * CE3 — plain iBGP (control)     → does NOT receive it
vrf:
- name: vrf-cust
  ipv4:
    route-target:
      import: [65000:100]
      export: [65000:100]
interface:
- {if-name: lo, ipv4: {address: 1.1.1.1/32}}
- {if-name: ce1, vrf: vrf-cust, ipv4: {address: 10.1.0.1/30}}
- {if-name: ce2, vrf: vrf-cust, ipv4: {address: 10.2.0.1/30}}
- {if-name: ce3, vrf: vrf-cust, ipv4: {address: 10.3.0.1/30}}
router:
  bgp:
    global: {as: 65000, router-id: 1.1.1.1}
    vrf:
    - name: vrf-cust
      rd: 65000:1
      neighbor:
      - remote-address: 10.1.0.2
        remote-as: 65000
        afi-safi: [{name: ipv4, enabled: true}]
      - remote-address: 10.2.0.2
        remote-as: 65000
        route-reflector: {client: true}
        afi-safi: [{name: ipv4, enabled: true}]
      - remote-address: 10.3.0.2
        remote-as: 65000
        afi-safi: [{name: ipv4, enabled: true}]
