# CE2 (AS 65000, iBGP) — receiver.
interface:
- {if-name: lo, ipv4: {address: 10.0.2.1/32}}
- {if-name: pe1, ipv4: {address: 10.2.0.2/30}}
router:
  bgp:
    global: {as: 65000, router-id: 10.0.2.1}
    timer: {adv-interval: {ibgp: 3}}
    neighbor:
    - remote-address: 10.2.0.1
      remote-as: 65000
      timers: {connect-retry-time: 3}
      enabled: true
      afi-safi: [{name: ipv4, enabled: true}]
